<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER MESSENGER | MOAMEN ABDELFATTAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cyber: '#06b6d4' } } } }</script>
    <style>
        body { font-family: 'Inter', sans-serif; user-select: none !important; }
        .glass { @apply bg-white/10 dark:bg-slate-900/50 backdrop-blur-xl border border-white/20 dark:border-slate-800; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/30 rounded; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-btn { @apply text-[10px] ml-2 opacity-60 hover:opacity-100 hover:text-cyber transition-all cursor-pointer; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 min-h-screen p-4 flex flex-col">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg rounded-2xl mb-6">
        <div class="flex flex-col">
            <h1 class="text-xl font-black text-cyber uppercase italic font-mono">Cyber Messenger</h1>
            <p class="text-[10px] font-bold opacity-60 uppercase">Prepared by: Moamen Abdelfattah</p>
        </div>
        <div id="user-badge-nav" class="hidden flex items-center gap-2 bg-cyber/10 px-3 py-1 rounded-full border border-cyber/20">
            <div class="w-2 h-2 bg-cyber rounded-full animate-pulse"></div>
            <span id="active-user" class="text-xs font-bold text-cyber mono"></span>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto w-full flex-1 flex flex-col">
        <section id="auth-section" class="max-w-md mx-auto mt-12 w-full glass p-8 rounded-[2rem] border-t-4 border-cyber animate-slide-up">
            <h2 id="auth-title" class="text-center text-2xl font-black mb-8 uppercase text-cyber italic">Security Terminal</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Agent ID" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white text-center font-bold outline-none focus:ring-2 focus:ring-cyber">
                <input type="password" id="password" placeholder="Passcode" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white text-center font-bold outline-none focus:ring-2 focus:ring-cyber">
                <button onclick="handleAuth()" class="w-full bg-cyber text-black p-4 rounded-xl font-black uppercase text-xs">Authorize Access</button>
                <button onclick="toggleAuth()" id="toggle-text" class="w-full text-[10px] text-slate-500 hover:text-cyber font-bold uppercase mt-2">Initialize New Node</button>
            </div>
        </section>

        <section id="setup-section" class="hidden max-w-md mx-auto mt-12 w-full glass p-8 rounded-[2rem] border-t-4 border-green-500 animate-slide-up text-center">
            <h2 class="text-2xl font-black text-green-500 mb-4 uppercase italic">Identity Setup</h2>
            <input type="text" id="new-handle-input" placeholder="@nickname" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-green-500 text-white">
            <button onclick="saveHandle()" class="w-full bg-green-500 text-white p-4 rounded-xl font-black uppercase text-xs">Confirm Identity</button>
        </section>

        <div id="chat-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-4 h-[80vh] overflow-hidden animate-slide-up">
            <aside class="lg:col-span-3 glass rounded-[2rem] p-5 flex flex-col relative">
                <p class="text-[9px] font-black text-cyber uppercase mb-4 border-b border-white/5 pb-2">Inbox</p>
                <div id="inbox-list" class="flex-1 overflow-y-auto space-y-2 chat-area"></div>
                <button onclick="location.reload()" class="mt-4 w-full bg-red-500/20 text-red-500 p-2 rounded-xl text-[10px] font-black uppercase">Logout</button>
            </aside>

            <main class="lg:col-span-6 glass rounded-[2rem] flex flex-col overflow-hidden relative">
                <div class="p-4 border-b border-white/10 bg-white/5">
                    <h3 id="t-name" class="font-bold text-sm uppercase italic text-white">Select Node</h3>
                </div>
                <div id="msgs-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area bg-slate-900/10 font-mono text-xs text-white"></div>
                <div class="p-4 bg-black/20 flex gap-3">
                    <input type="text" id="m-input" placeholder="Type secure message..." class="flex-1 bg-transparent outline-none text-white px-2">
                    <button onclick="dispatchMsg()" class="bg-cyber text-black p-3 rounded-xl font-black">SEND</button>
                </div>
            </main>

            <aside class="lg:col-span-3 glass rounded-[2rem] p-5 flex flex-col">
                <p class="text-[9px] font-black text-cyber uppercase mb-4 border-b border-white/5 pb-2">Discovery</p>
                <input type="text" id="searchInput" oninput="loadUsers()" placeholder="Search Agent..." class="mb-4 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white outline-none">
                <div id="user-list" class="flex-1 overflow-y-auto space-y-2 chat-area"></div>
            </aside>
        </div>
    </main>

    <script>
        let isLogin = true, me = null, target = null, myPriv = null, myPubPem = null, lastLen = 0, usersRaw = [];
        const pki = forge.pki;

        function toggleAuth() { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? 'Security Terminal' : 'Registration'; document.getElementById('toggle-text').innerText = isLogin ? 'Initialize New Node' : 'Back to Login'; }

        async function handleAuth() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return alert("Fill credentials");
            
            const securePass = forge.md.sha256.create().update(p).digest().toHex();
            let sPriv = localStorage.getItem(`cyber_v1_priv_${u}`), sPub = localStorage.getItem(`cyber_v1_pub_${u}`);
            
            if(!sPriv) {
                const pair = pki.rsa.generateKeyPair(1024);
                sPriv = pki.privateKeyToPem(pair.privateKey); sPub = pki.publicKeyToPem(pair.publicKey);
                localStorage.setItem(`cyber_v1_priv_${u}`, sPriv); localStorage.setItem(`cyber_v1_pub_${u}`, sPub);
            }
            myPriv = pki.privateKeyFromPem(sPriv); myPubPem = sPub;

            const res = await fetch('/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, password:securePass, publicKey:btoa(sPub), isLogin})});
            const data = await res.json();
            if(res.ok) { 
                me = data; 
                document.getElementById('auth-section').classList.add('hidden');
                if(!me.handle) document.getElementById('setup-section').classList.remove('hidden'); 
                else enterTerminal(); 
            } else alert(data.error);
        }

        async function saveHandle() {
            const h = document.getElementById('new-handle-input').value.trim();
            const curU = (me && me.username) ? me.username : document.getElementById('username').value.trim().toLowerCase();
            const res = await fetch('/set-handle', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: curU, handle: h})});
            if(res.ok) { if(!me) me = { username: curU }; me.handle = h; enterTerminal(); }
        }

        function enterTerminal() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('user-badge-nav').classList.remove('hidden');
            document.getElementById('active-user').innerText = "@" + (me.handle || me.username);
            setInterval(sync, 2000); fetchUsers();
        }

        async function fetchUsers() { const res = await fetch('/users'); usersRaw = await res.json(); }
        function loadUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = usersRaw.filter(u => u.username.toLowerCase().includes(q) && u.username !== me.username);
            document.getElementById('user-list').innerHTML = filtered.map(u => `<div onclick='setTarget(${JSON.stringify(u)})' class="p-3 glass rounded-xl cursor-pointer hover:bg-cyber/10 mb-1 border border-white/5 flex justify-between items-center transition-all animate-slide-up"><span class="text-[10px] font-black uppercase text-white truncate w-32">@${u.handle || u.username}</span></div>`).join('');
        }

        function setTarget(u) { target = u; lastLen = 0; document.getElementById('t-name').innerText = (u.handle || u.username).toUpperCase(); document.getElementById('msgs-box').innerHTML = ''; }

        async function dispatchMsg() {
            const input = document.getElementById('m-input'), txt = input.value.trim();
            if(!txt || !target) return;
            try {
                const myClean = me.username.trim().toLowerCase(), targetClean = target.username.trim().toLowerCase();
                const tPub = pki.publicKeyFromPem(atob(target.publicKey));
                const mRec = forge.util.encode64(tPub.encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP'));
                const mMe = forge.util.encode64(pki.publicKeyFromPem(myPubPem).encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP'));
                await fetch('/send', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sender: myClean, receiver: targetClean, message: mRec, senderCopy: mMe})});
                input.value = ''; lastLen = 0; sync();
            } catch (e) { alert("Encryption Fault"); }
        }

        async function sync() {
            if(!me) return;
            try {
                const myClean = me.username.trim().toLowerCase();
                // 1. Inbox Update
                const inRes = await fetch(`/messages/${myClean}`);
                const inData = await inRes.json();
                const unique = {};
                inData.forEach(p => { 
                    const s = p.sender.trim().toLowerCase();
                    if(!unique[s]) {
                        try { 
                            const part = (s === myClean) ? p.senderCopy : p.message;
                            unique[s] = forge.util.decodeUtf8(myPriv.decrypt(forge.util.decode64(part), 'RSA-OAEP'));
                        } catch(e) { unique[s] = "🔒 Packet"; }
                    }
                });
                document.getElementById('inbox-list').innerHTML = Object.keys(unique).map(s => `<div onclick='openFromInbox("${s}")' class="p-3 glass rounded-xl cursor-pointer border-l-2 border-cyber mb-2 hover:bg-cyber/5"><p class="text-[9px] font-black uppercase text-cyber">@${s}</p><p class="text-[8px] opacity-60 truncate text-white">${unique[s]}</p></div>`).join('');

                if(!target) return;
                // 2. Chat Sync
                const res = await fetch(`/messages-full/${myClean}/${target.username.trim().toLowerCase()}`);
                const msgs = await res.json();
                if(msgs.length === lastLen) return;
                lastLen = msgs.length;
                document.getElementById('msgs-box').innerHTML = msgs.map(m => {
                    const isMe = m.sender.trim().toLowerCase() === myClean;
                    let d = ""; try { d = forge.util.decodeUtf8(myPriv.decrypt(forge.util.decode64(isMe ? m.senderCopy : m.message), 'RSA-OAEP')); } catch(e) { d = "🔒 Locked"; }
                    return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up"><div class="${isMe ? 'bg-cyber text-black font-bold' : 'glass text-white'} p-3 rounded-2xl max-w-[85%] mb-2 shadow-lg"><p class="text-[7px] opacity-50 mb-1 uppercase">${m.sender}</p><p class="text-xs break-words">${d}</p></div></div>`;
                }).join('');
                document.getElementById('msgs-box').scrollTop = document.getElementById('msgs-box').scrollHeight;
            } catch(e) {}
        }
        function openFromInbox(s) { const u = usersRaw.find(x => x.username.trim().toLowerCase() === s); if(u) setTarget(u); }
    </script>
</body>
</html>
