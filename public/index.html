<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Messenger | Blue Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --container-bg: #ffffff;
            --text-color: #333;
            --primary-blue: #007bff;
            --secondary-blue: #0056b3;
            --input-border: #ccc;
        }

        /* الثيم الدارك (بناءً على طلبك) */
        .dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --input-border: #444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid var(--input-border);
            background: transparent;
            color: var(--text-color);
        }

        button {
            width: 95%;
            padding: 10px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: var(--secondary-blue); }

        .mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
        }

        #usersContainer {
            max-height: 150px;
            overflow-y: auto;
            margin: 15px 0;
            border: 1px solid var(--input-border);
            border-radius: 6px;
        }

        .user-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--input-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item:hover { background: rgba(0,123,255,0.1); }
        .online { color: #2ecc71; font-size: 12px; }
        .offline { color: #95a5a6; font-size: 12px; }
        .hidden { display: none; }
        .chat-window { height: 120px; overflow-y: auto; background: rgba(0,0,0,0.05); padding: 5px; margin-bottom: 5px; text-align: right; }
    </style>
</head>
<body class="dark-mode"> <div class="mode-toggle" onclick="toggleMode()">🌓</div>

    <div class="container" id="authBox">
        <h2 style="color: var(--primary-blue);">Cyber Messenger</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <button onclick="register()" style="margin-top: 5px; opacity: 0.8;">إنشاء حساب</button>
        <p onclick="toggleReset()" style="font-size: 12px; cursor: pointer; margin-top: 10px;">نسيت كلمة المرور؟</p>
        
        <div id="resetBox" class="hidden">
            <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
            <button onclick="resetPassword()">تحديث</button>
        </div>
    </div>

    <div class="container hidden" id="chatBox">
        <h3 style="color: var(--primary-blue);">أهلاً، <span id="displayUser"></span></h3>
        
        <input type="text" id="searchInput" placeholder="ابحث عن صديق..." onkeyup="loadUsers()">
        
        <div id="usersContainer"></div>

        <div id="chatArea" class="hidden">
            <h4 id="chattingWith" style="font-size: 14px;">مراسلة: ...</h4>
            <div id="messages" class="chat-window"></div>
            <input type="text" id="msgInput" placeholder="اكتب رسالة مشفرة...">
            <button onclick="sendMessage()">إرسال RSA</button>
        </div>

        <button onclick="location.reload()" style="background: #dc3545; margin-top: 15px;">خروج</button>
    </div>

    <script>
        let loggedInUser = null;
        let selectedUser = null;
        let myKeys = null;

        // توليد مفاتيح RSA
        const rsa = forge.pki.rsa;
        myKeys = rsa.generateKeyPair({bits: 1024});
        const myPubKeyPem = forge.pki.publicKeyToPem(myKeys.publicKey);

        function toggleMode() {
            document.body.classList.toggle('dark-mode');
        }

        async function register() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p, publicKey: myPubKeyPem })
            });
            const data = await res.json();
            alert(data.message || data.error);
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            if (res.ok) {
                loggedInUser = await res.json();
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('chatBox').classList.remove('hidden');
                document.getElementById('displayUser').innerText = loggedInUser.username;
                loadUsers();
                startSync();
            } else { alert("خطأ في البيانات!"); }
        }

        async function resetPassword() {
            const u = document.getElementById('username').value;
            const np = document.getElementById('newPassword').value;
            await fetch('/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, newPassword: np })
            });
            alert("تم التحديث");
        }

        async function loadUsers() {
            const s = document.getElementById('searchInput').value;
            const res = await fetch(`/users?search=${s}`);
            const users = await res.json();
            const container = document.getElementById('usersContainer');
            container.innerHTML = "";

            users.forEach(u => {
                if (u.username === loggedInUser.username) return;
                const statusStr = u.status === 'online' ? '● أونلاين' : '● أوفلاين';
                const statusClass = u.status === 'online' ? 'online' : 'offline';
                container.innerHTML += `
                    <div class="user-item" onclick="selectUser('${u.username}', '${u.publicKey.replace(/\n/g, '@@')}')">
                        <strong>${u.username}</strong>
                        <span class="${statusClass}">${statusStr}</span>
                    </div>`;
            });
        }

        function selectUser(name, key) {
            selectedUser = { username: name, publicKey: key.replace(/@@/g, '\n') };
            document.getElementById('chatArea').classList.remove('hidden');
            document.getElementById('chattingWith').innerText = "مراسلة: " + name;
            document.getElementById('messages').innerHTML = "";
        }

        async function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if (!selectedUser || !text) return;

            const pubKey = forge.pki.publicKeyFromPem(selectedUser.publicKey);
            const encrypted = forge.util.encode64(pubKey.encrypt(text));

            await fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sender: loggedInUser.username, receiver: selectedUser.username, message: encrypted })
            });
            document.getElementById('messages').innerHTML += `<div>أنت: ${text}</div>`;
            document.getElementById('msgInput').value = "";
        }

        async function checkMsgs() {
            const res = await fetch(`/messages/${loggedInUser.username}`);
            const msgs = await res.json();
            msgs.forEach(m => {
                try {
                    const decrypted = myKeys.privateKey.decrypt(forge.util.decode64(m.message));
                    document.getElementById('messages').innerHTML += `<div style="color:var(--primary-blue)">${m.sender}: ${decrypted}</div>`;
                } catch(e) { console.log("Error decrypting"); }
            });
        }

        function startSync() {
            setInterval(() => {
                fetch('/heartbeat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: loggedInUser.username })
                });
                if (document.getElementById('searchInput').value === "") loadUsers();
                checkMsgs();
            }, 5000);
        }

        function toggleReset() { document.getElementById('resetBox').classList.toggle('hidden'); }
    </script>
</body>
</html>
