<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBER MESSENGER | FINAL ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: monospace; user-select: none; }
        .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(6, 182, 212, 0.2); backdrop-filter: blur(10px); }
        .cyber-txt { color: #06b6d4; text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
        .chat-area::-webkit-scrollbar { width: 3px; }
        .chat-area::-webkit-scrollbar-thumb { background: #06b6d4; }
    </style>
</head>
<body class="h-screen p-4 flex flex-col">

    <div id="auth-ui" class="max-w-md mx-auto mt-20 w-full glass p-8 rounded-[2rem] border-t-4 border-cyan-500">
        <h1 class="text-2xl font-black cyber-txt italic mb-6 uppercase text-center">Security Terminal</h1>
        <div id="auth-form" class="space-y-4">
            <input type="text" id="u" placeholder="AGENT_ID" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500">
            <input type="password" id="p" placeholder="PASSCODE" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500">
            <button onclick="handleAuth(true)" class="w-full bg-cyan-500 text-black font-black p-4 rounded-xl hover:scale-95 transition">AUTHORIZE LOGIN</button>
            <div class="flex justify-between text-[10px] opacity-50">
                <button onclick="handleAuth(false)">REGISTER NODE</button>
                <button onclick="toggleReset(true)">FORGOT PASS?</button>
            </div>
        </div>
        <div id="reset-form" class="hidden space-y-4">
            <input type="text" id="ru" placeholder="AGENT_ID" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none">
            <input type="password" id="rp" placeholder="NEW_PASSCODE" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none">
            <button onclick="resetPass()" class="w-full bg-red-500 text-white font-black p-4 rounded-xl">RESET CREDENTIALS</button>
            <button onclick="toggleReset(false)" class="w-full text-[10px] opacity-50">BACK TO LOGIN</button>
        </div>
    </div>

    <div id="setup-ui" class="hidden max-w-md mx-auto mt-20 w-full glass p-8 rounded-[2rem] border-t-4 border-green-500 text-center">
        <h2 class="text-xl font-black text-green-500 mb-4">IDENTITY SETUP</h2>
        <input type="text" id="h-input" placeholder="CHOOSE_NICKNAME (@moamen)" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none mb-4">
        <button onclick="saveHandle()" class="w-full bg-green-500 text-white font-black p-4 rounded-xl">CONFIRM IDENTITY</button>
    </div>

    <div id="main-ui" class="hidden grid grid-cols-12 gap-4 h-full max-w-7xl mx-auto w-full overflow-hidden">
        <aside class="col-span-4 glass rounded-[2.5rem] p-5 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div><p class="text-[9px] opacity-40">NODE_ACTIVE</p><h2 id="me-display" class="cyber-txt font-black uppercase italic text-xs"></h2></div>
                <button onclick="logout()" class="text-red-500 text-[10px] font-black border border-red-500/20 px-2 py-1 rounded">EXIT</button>
            </div>

            <input type="text" id="search" oninput="drawUsers()" placeholder="Search Nodes..." class="w-full bg-black/40 border border-white/5 p-3 rounded-xl text-[10px] mb-4 outline-none focus:border-cyan-500">
            
            <div class="flex-1 overflow-y-auto space-y-4 chat-area">
                <div id="inbox-section">
                    <p class="text-[9px] font-black cyber-txt mb-2">INCOMING_PACKETS</p>
                    <div id="inbox-list" class="space-y-1"></div>
                </div>
                <div>
                    <p class="text-[9px] font-black opacity-30 mb-2 italic">DISCOVERED_NODES</p>
                    <div id="user-list" class="space-y-1"></div>
                </div>
                <div>
                    <div class="flex justify-between"><p class="text-[9px] font-black opacity-30 italic">SECTORS</p><button onclick="createGroup()" class="text-[8px] text-cyan-500">+NEW</button></div>
                    <div id="group-list" class="space-y-1 mt-2"></div>
                </div>
            </div>
        </aside>

        <main class="col-span-8 glass rounded-[2.5rem] flex flex-col overflow-hidden relative">
            <div id="chat-header" class="p-4 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="t-avatar" class="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-500 font-black">?</div>
                    <div><h3 id="t-name" class="font-black text-xs uppercase italic">Select Node</h3><p id="t-status" class="text-[8px] opacity-40">STANDBY</p></div>
                </div>
                <div id="g-tools" class="hidden flex gap-2">
                    <button onclick="showMembers()" class="text-[8px] border border-white/10 px-2 py-1 rounded">MEMBERS</button>
                    <button onclick="addMember()" class="text-[8px] bg-cyan-500 text-black px-2 py-1 rounded">ADD</button>
                </div>
            </div>

            <div id="msgs-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area"></div>

            <div class="p-4 bg-black/40 flex gap-2">
                <input type="text" id="m-in" placeholder="Enter encrypted data..." class="flex-1 bg-transparent outline-none text-[11px] px-2">
                <button onclick="sendMsg()" class="bg-cyan-500 text-black px-6 py-2 rounded-xl font-black text-[10px]">SEND</button>
            </div>
        </main>
    </div>

    <script>
        let me = null, target = null, gActive = null, myPriv = null, lastLen = 0, usersRaw = [];
        const pki = forge.pki;

        // --- Auth ---
        async function handleAuth(isLogin) {
            const u = document.getElementById('u').value.trim().toLowerCase(), p = document.getElementById('p').value.trim();
            if(!u || !p) return;

            let sPriv = localStorage.getItem(`priv_${u}`), sPub = localStorage.getItem(`pub_${u}`);
            if(!sPriv) {
                const pair = pki.rsa.generateKeyPair(1024);
                sPriv = pki.privateKeyToPem(pair.privateKey); sPub = pki.publicKeyToPem(pair.publicKey);
                localStorage.setItem(`priv_${u}`, sPriv); localStorage.setItem(`pub_${u}`, sPub);
            }
            myPriv = pki.privateKeyFromPem(sPriv);

            const res = await fetch('/auth', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p, publicKey: btoa(sPub), isLogin})
            });
            const data = await res.json();
            if(res.ok) {
                if(!isLogin) return alert("Node Created. Login now.");
                me = data;
                document.getElementById('auth-ui').classList.add('hidden');
                if(!data.handle) document.getElementById('setup-ui').classList.remove('hidden');
                else startTerminal();
            } else alert(data.error);
        }

        async function saveHandle() {
            const h = document.getElementById('h-input').value.trim();
            await fetch('/set-handle', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: me.username, handle: h})});
            me.handle = h; startTerminal();
        }

        function startTerminal() {
            document.getElementById('setup-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('me-display').innerText = "@" + me.handle;
            setInterval(sync, 2000); fetchUsers(); loadGroups();
        }

        // --- UI Operations ---
        async function fetchUsers() {
            const res = await fetch('/users'); usersRaw = await res.json(); drawUsers();
        }

        function drawUsers() {
            const q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('user-list');
            const filtered = usersRaw.filter(u => (u.username.includes(q) || u.handle.includes(q)) && u.username !== me.username);
            list.innerHTML = filtered.map(u => `
                <div onclick='setTarget(${JSON.stringify(u)})' class="p-3 glass rounded-xl cursor-pointer hover:bg-cyan-500/5 flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold">@${u.handle || u.username}</span>
                    <div class="w-1.5 h-1.5 rounded-full ${u.status === 'online' ? 'bg-green-500' : 'bg-slate-700'}"></div>
                </div>`).join('');
        }

        function setTarget(u) {
            target = u; gActive = null; lastLen = 0;
            document.getElementById('t-name').innerText = "@" + (u.handle || u.username);
            document.getElementById('t-avatar').innerText = (u.handle || u.username)[0].toUpperCase();
            document.getElementById('t-status').innerText = "RSA_LINK_ESTABLISHED";
            document.getElementById('g-tools').classList.add('hidden');
            document.getElementById('msgs-box').innerHTML = '';
        }

        async function sendMsg() {
            const input = document.getElementById('m-in'), txt = input.value.trim();
            if(!txt || (!target && !gActive)) return;
            try {
                let packet = txt;
                if(target) {
                    const pubKey = pki.publicKeyFromPem(atob(target.publicKey));
                    packet = forge.util.encode64(pubKey.encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP'));
                }
                await fetch('/send', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sender: me.username, receiver: target ? target.username : gActive.id, message: packet})});
                input.value = '';
            } catch(e) { alert("CRYPTO_ERR"); }
        }

        async function sync() {
            if(!me) return;
            // Chat Sync
            if(!target && !gActive) return;
            const res = await fetch(`/msgs/${me.username}/${target ? target.username : gActive.id}`);
            const msgs = await res.json();
            if(msgs.length === lastLen) return;
            lastLen = msgs.length;

            document.getElementById('msgs-box').innerHTML = msgs.map(m => {
                let d = m.message; const isMe = m.sender === me.username;
                if(!isMe && target) { try { d = forge.util.decodeUtf8(myPriv.decrypt(forge.util.decode64(m.message), 'RSA-OAEP')); } catch(e) { d = "🔒 [ENC_PACKET]"; } }
                return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} group">
                    <div class="${isMe ? 'bg-cyan-500 text-black' : 'glass'} p-3 rounded-2xl max-w-[80%] relative">
                        <p class="text-[7px] uppercase opacity-50 font-black">${m.sender}</p>
                        <p class="text-[11px]">${d}</p>
                    </div></div>`;
            }).join('');
            document.getElementById('msgs-box').scrollTop = document.getElementById('msgs-box').scrollHeight;
        }

        // --- Group Logic ---
        async function createGroup() {
            const n = prompt("Sector Name:");
            if(n) { await fetch('/groups/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: n, creator: me.username})}); loadGroups(); }
        }
        async function loadGroups() {
            const res = await fetch(`/my-groups/${me.username}`);
            const gs = await res.json();
            document.getElementById('group-list').innerHTML = gs.map(g => `<div onclick='setGroup(${JSON.stringify(g)})' class="p-2 glass rounded-lg text-[9px] cursor-pointer hover:bg-cyan-500/10 uppercase"># ${g.name}</div>`).join('');
        }
        function setGroup(g) {
            gActive = g; target = null; lastLen = 0;
            document.getElementById('t-name').innerText = g.name; document.getElementById('g-tools').classList.remove('hidden');
            document.getElementById('msgs-box').innerHTML = '';
        }
        async function addMember() {
            const m = prompt("Enter Agent ID to invite:");
            if(m) await fetch('/groups/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({gid: gActive.id, member: m})});
        }
        async function showMembers() {
            const res = await fetch(`/groups-info/${gActive.id}`);
            const data = await res.json();
            alert("MEMBERS:\n" + Object.keys(data.members).join('\n'));
        }

        // --- Helpers ---
        function toggleReset(show) { document.getElementById('auth-form').classList.toggle('hidden', show); document.getElementById('reset-form').classList.toggle('hidden', !show); }
        async function resetPass() {
            const u = document.getElementById('ru').value, p = document.getElementById('rp').value;
            const res = await fetch('/reset-pass', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, newPassword: p})});
            if(res.ok) { alert("Credentials Updated"); toggleReset(false); } else alert("User not found");
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
