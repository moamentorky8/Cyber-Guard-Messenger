<script>
let isLogin = true, me = null, target = null, myPriv = null, myPubPem = null, lastLen = 0, usersRaw = [];
const pki = forge.pki;

/* ================= TOGGLE ================= */
function toggleAuth() {
    isLogin = !isLogin;
    document.getElementById('auth-title').innerText = isLogin ? 'Security Terminal' : 'Registration';
    document.getElementById('toggle-text').innerText = isLogin ? 'Initialize New Node' : 'Back to Login';
}

/* ================= AUTH ================= */
async function handleAuth() {
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value.trim();

    if(!u || !p) return alert("Fill credentials");

    const securePass = forge.md.sha256.create().update(p).digest().toHex();

    let sPriv = localStorage.getItem(`cyber_v1_priv_${u}`);
    let sPub  = localStorage.getItem(`cyber_v1_pub_${u}`);

    if(!sPriv) {
        const pair = pki.rsa.generateKeyPair(2048); // 🔥 مهم
        sPriv = pki.privateKeyToPem(pair.privateKey);
        sPub  = pki.publicKeyToPem(pair.publicKey);

        localStorage.setItem(`cyber_v1_priv_${u}`, sPriv);
        localStorage.setItem(`cyber_v1_pub_${u}`, sPub);
    }

    myPriv = pki.privateKeyFromPem(sPriv);
    myPubPem = sPub;

    const res = await fetch('/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: u,
            password: securePass,
            publicKey: btoa(sPub),
            isLogin
        })
    });

    const data = await res.json();

    if(res.ok) {
        me = data;

        if(!me.username) me.username = u; // 🔥 fix مهم

        document.getElementById('auth-section').classList.add('hidden');

        if(!me.handle) {
            document.getElementById('setup-section').classList.remove('hidden');
        } else {
            enterTerminal();
        }

    } else {
        alert(data.error || "Auth failed");
    }
}

/* ================= HANDLE ================= */
async function saveHandle() {
    const h = document.getElementById('new-handle-input').value.trim();

    if(!h) return alert("Enter handle");

    const curU = me.username;

    try {
        const res = await fetch('/set-handle', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: curU,
                handle: h
            })
        });

        const data = await res.json();

        if(res.ok) {
            me.handle = h;
            enterTerminal();
        } else {
            alert(data.error || "Failed");
        }

    } catch {
        alert("Server error");
    }
}

/* ================= ENTER ================= */
function enterTerminal() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('setup-section').classList.add('hidden');
    document.getElementById('chat-section').classList.remove('hidden');
    document.getElementById('user-badge-nav').classList.remove('hidden');

    document.getElementById('active-user').innerText = "@" + (me.handle || me.username);

    setInterval(sync, 2000);
    fetchUsers();
}

/* ================= USERS ================= */
async function fetchUsers() {
    const res = await fetch('/users');
    usersRaw = await res.json();
}

function loadUsers() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();

    const filtered = usersRaw.filter(u =>
        u.username.toLowerCase().includes(q) &&
        u.username !== me.username
    );

    document.getElementById('user-list').innerHTML =
        filtered.map(u => `
        <div onclick='setTarget(${JSON.stringify(u)})'
        class="p-3 glass rounded-xl cursor-pointer hover:bg-cyber/10 mb-1 border border-white/5 flex justify-between items-center transition-all animate-slide-up">
            <span class="text-[10px] font-black uppercase text-white truncate w-32">
                @${u.handle || u.username}
            </span>
        </div>
        `).join('');
}

function setTarget(u) {
    target = u;
    lastLen = 0;
    document.getElementById('t-name').innerText = (u.handle || u.username).toUpperCase();
    document.getElementById('msgs-box').innerHTML = '';
}

/* ================= SEND ================= */
async function dispatchMsg() {
    const input = document.getElementById('m-input');
    const txt = input.value.trim();

    if(!txt || !target) return;

    if(!target.publicKey) {
        alert("User not ready yet");
        return;
    }

    try {
        const myClean = me.username.toLowerCase();
        const targetClean = target.username.toLowerCase();

        const tPub = pki.publicKeyFromPem(atob(target.publicKey));

        const mRec = forge.util.encode64(
            tPub.encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP')
        );

        const mMe = forge.util.encode64(
            pki.publicKeyFromPem(myPubPem)
            .encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP')
        );

        await fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                sender: myClean,
                receiver: targetClean,
                message: mRec,
                senderCopy: mMe
            })
        });

        input.value = '';
        lastLen = 0;
        sync();

    } catch (e) {
        console.error(e);
        alert("Encryption Fault");
    }
}

/* ================= SYNC ================= */
async function sync() {
    if(!me) return;

    const myClean = me.username.toLowerCase();

    // inbox
    const inRes = await fetch(`/messages/${myClean}`);
    const inData = await inRes.json();

    const unique = {};

    inData.forEach(p => {
        const s = p.sender.toLowerCase();

        if(!unique[s]) {
            try {
                const part = (s === myClean) ? p.senderCopy : p.message;

                unique[s] = forge.util.decodeUtf8(
                    myPriv.decrypt(forge.util.decode64(part), 'RSA-OAEP')
                );
            } catch {
                unique[s] = "🔒";
            }
        }
    });

    document.getElementById('inbox-list').innerHTML =
        Object.keys(unique).map(s => `
        <div onclick='openFromInbox("${s}")'
        class="p-3 glass rounded-xl cursor-pointer border-l-2 border-cyber mb-2 hover:bg-cyber/5">
            <p class="text-[9px] font-black uppercase text-cyber">@${s}</p>
            <p class="text-[8px] opacity-60 truncate text-white">${unique[s]}</p>
        </div>
        `).join('');

    if(!target) return;

    const res = await fetch(`/messages-full/${myClean}/${target.username}`);
    const msgs = await res.json();

    if(msgs.length === lastLen) return;
    lastLen = msgs.length;

    document.getElementById('msgs-box').innerHTML =
        msgs.map(m => {
            const isMe = m.sender === myClean;

            let d = "";
            try {
                d = forge.util.decodeUtf8(
                    myPriv.decrypt(
                        forge.util.decode64(isMe ? m.senderCopy : m.message),
                        'RSA-OAEP'
                    )
                );
            } catch {
                d = "🔒 Locked";
            }

            return `
            <div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up">
                <div class="${isMe ? 'bg-cyber text-black font-bold' : 'glass text-white'} p-3 rounded-2xl max-w-[85%] mb-2 shadow-lg">
                    <p class="text-[7px] opacity-50 mb-1 uppercase">${m.sender}</p>
                    <p class="text-xs break-words">${d}</p>
                </div>
            </div>`;
        }).join('');
}

/* ================= OPEN ================= */
function openFromInbox(s) {
    const u = usersRaw.find(x => x.username.toLowerCase() === s);
    if(u) setTarget(u);
}
</script>
