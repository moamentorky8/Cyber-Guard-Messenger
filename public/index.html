<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CYBER TERMINAL V4 | COMPLETE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: monospace; }
        .glass { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(6, 182, 212, 0.2); backdrop-filter: blur(10px); }
        .cyber-txt { color: #06b6d4; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        .chat-area::-webkit-scrollbar { width: 3px; }
        .chat-area::-webkit-scrollbar-thumb { background: #06b6d4; }
    </style>
</head>
<body class="h-screen p-4 flex flex-col">

    <div id="auth-ui" class="max-w-md mx-auto mt-20 w-full glass p-8 rounded-3xl border-t-4 border-cyan-500">
        <h1 class="text-2xl font-black cyber-txt italic mb-8 uppercase tracking-widest text-center">Authorization</h1>
        <div class="space-y-4">
            <input type="text" id="u" placeholder="AGENT_ID" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500">
            <input type="password" id="p" placeholder="CIPHER_PASS" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500">
            <button onclick="auth(true)" class="w-full bg-cyan-500 text-black font-black p-4 rounded-xl hover:scale-95 transition">LOGIN_NODE</button>
            <button onclick="auth(false)" class="w-full text-[10px] opacity-40 uppercase tracking-widest text-center">Initialize_New_Account</button>
        </div>
    </div>

    <div id="chat-ui" class="hidden grid grid-cols-12 gap-4 h-full max-w-7xl mx-auto w-full overflow-hidden">
        <aside class="col-span-4 glass rounded-3xl p-5 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 id="me" class="cyber-txt font-black text-xs uppercase italic"></h2>
                <button onclick="logout()" class="text-red-500 text-[10px] font-black border border-red-500/20 px-2 py-1 rounded">LOG_OUT</button>
            </div>

            <input type="text" id="search" oninput="ui_drawUsers()" placeholder="Search Nodes..." class="w-full bg-black/40 border border-white/5 p-3 rounded-xl text-[10px] mb-4 outline-none focus:border-cyan-500">
            
            <div class="flex-1 overflow-y-auto space-y-4 chat-area">
                <div>
                    <p class="text-[9px] font-black cyber-txt uppercase mb-2">Incoming_Packets (Inbox)</p>
                    <div id="inbox-box" class="space-y-1"></div>
                </div>
                <div>
                    <p class="text-[9px] font-black opacity-30 uppercase mb-2 italic">Active_Nodes</p>
                    <div id="user-box" class="space-y-1"></div>
                </div>
                <div>
                    <div class="flex justify-between"><p class="text-[9px] font-black opacity-30 uppercase mb-2 italic">Sectors (Groups)</p><button onclick="createGroup()" class="text-[8px] text-cyan-500">+NEW</button></div>
                    <div id="group-box" class="space-y-1"></div>
                </div>
            </div>
        </aside>

        <main class="col-span-8 glass rounded-3xl flex flex-col overflow-hidden relative">
            <div class="p-4 border-b border-white/5 bg-white/5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="t-avatar" class="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-500 font-black">?</div>
                    <div><h3 id="t-name" class="font-black text-xs uppercase italic">Select_Target</h3><p id="t-status" class="text-[8px] opacity-40">ENCRYPTED_IDLE</p></div>
                </div>
                <div id="g-tools" class="hidden flex gap-2">
                    <button onclick="addGroupMember()" class="text-[8px] bg-cyan-500 text-black px-2 py-1 rounded">ADD_MEMBER</button>
                    <button onclick="deleteGroup()" class="text-[8px] bg-red-500 text-white px-2 py-1 rounded">DESTROY</button>
                </div>
            </div>

            <div id="msgs-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area"></div>

            <div class="p-4 bg-black/40 flex gap-2">
                <input type="text" id="m-in" placeholder="Enter encrypted packet..." class="flex-1 bg-transparent outline-none text-[11px] px-2">
                <button onclick="send()" class="bg-cyan-500 text-black px-6 py-2 rounded-xl font-black text-[10px]">SEND</button>
            </div>
        </main>
    </div>

    <script>
        let me = null, target = null, gActive = null, myPriv = null, lastLen = 0, usersRaw = [];
        const pki = forge.pki;

        async function auth(isLogin) {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            if(!u || !p) return;

            let storedPriv = localStorage.getItem(`priv_v4_${u}`);
            let storedPub = localStorage.getItem(`pub_v4_${u}`);
            if(!storedPriv) {
                const pair = pki.rsa.generateKeyPair(1024);
                storedPriv = pki.privateKeyToPem(pair.privateKey);
                storedPub = pki.publicKeyToPem(pair.publicKey);
                localStorage.setItem(`priv_v4_${u}`, storedPriv);
                localStorage.setItem(`pub_v4_${u}`, storedPub);
            }
            myPriv = pki.privateKeyFromPem(storedPriv);

            const res = await fetch('/auth', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p, publicKey: btoa(storedPub), isLogin})
            });
            const data = await res.json();
            if(res.ok) {
                if(!isLogin) return alert("System_Initialized.");
                me = { username: u };
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('chat-ui').classList.remove('hidden');
                document.getElementById('me').innerText = "@" + u;
                initLoop();
            } else alert(data.error);
        }

        function initLoop() {
            setInterval(sync, 2000);
            fetchUsers(); ui_loadGroups();
        }

        async function fetchUsers() {
            const res = await fetch('/users');
            usersRaw = await res.json();
            ui_drawUsers();
        }

        function ui_drawUsers() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('user-box');
            const filtered = usersRaw.filter(u => u.username.includes(q) && u.username !== me.username);
            container.innerHTML = filtered.map(u => `
                <div onclick='setTarget(${JSON.stringify(u)})' class="p-3 glass rounded-xl cursor-pointer hover:bg-cyan-500/5 flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold">@${u.username}</span>
                    <div class="w-1.5 h-1.5 rounded-full ${u.status === 'online' ? 'bg-green-500 shadow-[0_0_5px_green]' : 'bg-slate-700'}"></div>
                </div>`).join('');
        }

        function setTarget(u) {
            target = u; gActive = null; lastLen = 0;
            document.getElementById('t-name').innerText = "@" + u.username;
            document.getElementById('t-status').innerText = "PRIVATE_SECURE_NODE";
            document.getElementById('g-tools').classList.add('hidden');
            document.getElementById('msgs-box').innerHTML = '';
        }

        async function send() {
            const input = document.getElementById('m-in'), txt = input.value.trim();
            if(!txt || (!target && !gActive)) return;
            try {
                let packet = txt;
                if(target) {
                    const pubKey = pki.publicKeyFromPem(atob(target.publicKey));
                    packet = forge.util.encode64(pubKey.encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP'));
                }
                await fetch('/send', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sender: me.username, receiver: target ? target.username : gActive.id, message: packet})
                });
                input.value = '';
            } catch (e) { alert("CRYPTO_ERR"); }
        }

        async function sync() {
            if(!me) return;
            // Inbox Logic
            const inboxRes = await fetch(`/inbox/${me.username}`);
            const inbox = await inboxRes.json();
            document.getElementById('inbox-box').innerHTML = inbox.map(m => `
                <div onclick="setTarget({username:'${m.sender}', publicKey:'${usersRaw.find(u=>u.username===m.sender)?.publicKey}'})" class="p-2 glass rounded-lg border-l-2 border-cyan-500 mb-1 cursor-pointer">
                    <p class="text-[8px] cyber-txt">FROM: @${m.sender}</p>
                </div>`).join('');

            // Chat Sync
            if(!target && !gActive) return;
            const res = await fetch(`/msgs/${me.username}/${target ? target.username : gActive.id}`);
            const msgs = await res.json();
            if(msgs.length === lastLen) return;
            lastLen = msgs.length;

            const box = document.getElementById('msgs-box');
            box.innerHTML = msgs.map(m => {
                let d = m.message;
                const isMe = m.sender === me.username;
                if(!isMe && target) {
                    try { d = forge.util.decodeUtf8(myPriv.decrypt(forge.util.decode64(m.message), 'RSA-OAEP')); } catch(e) { d = "🔒 [ENC_PACKET]"; }
                }
                return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} group">
                    <div class="${isMe ? 'bg-cyan-500 text-black' : 'glass'} p-3 rounded-2xl max-w-[80%] relative">
                        <p class="text-[7px] uppercase opacity-50 font-black">${m.sender} ${m.edited ? '[EDIT]' : ''}</p>
                        <p class="text-[11px]">${d}</p>
                        ${isMe ? `<div class="text-right mt-1 opacity-0 group-hover:opacity-100 transition"><span onclick="ui_edit('${m.id}')" class="cursor-pointer text-[9px] mr-2">✎</span><span onclick="ui_del('${m.id}')" class="cursor-pointer text-[9px] text-red-700">✖</span></div>` : ''}
                    </div></div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function ui_edit(id) {
            const n = prompt("Edit packet:");
            if(n) await fetch('/edit-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, newVal: n})});
        }
        async function ui_del(id) {
            if(confirm("Destroy?")) await fetch('/del-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id})});
        }
        function logout() { localStorage.removeItem(`priv_v4_${me.username}`); location.reload(); }

        // --- Groups ---
        async function createGroup() {
            const n = prompt("Group Name:");
            if(n) await fetch('/group/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: n, user: me.username})});
        }
        async function ui_loadGroups() {
            const res = await fetch(`/groups/${me.username}`);
            const gs = await res.json();
            document.getElementById('group-box').innerHTML = gs.map(g => `<div onclick='setGroup(${JSON.stringify(g)})' class="p-2 glass rounded-lg text-[9px] cursor-pointer mb-1 hover:bg-cyan-500/10 uppercase"># ${g.name}</div>`).join('');
        }
        function setGroup(g) {
            gActive = g; target = null; lastLen = 0;
            document.getElementById('t-name').innerText = g.name;
            document.getElementById('t-status').innerText = "SECTOR_OPEN_CHANNEL";
            document.getElementById('g-tools').classList.remove('hidden');
            document.getElementById('msgs-box').innerHTML = '';
        }
        async function addGroupMember() {
            const m = prompt("Agent ID:");
            if(m) await fetch('/group/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({gid: gActive.id, member: m.toLowerCase()})});
        }
        async function deleteGroup() {
            if(confirm("Destroy?")) { await fetch('/group/del', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({gid: gActive.id})}); location.reload(); }
        }
    </script>
</body>
</html>
