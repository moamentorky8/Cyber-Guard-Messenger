<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER MESSENGER | MOAMEN ABDELFATTAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cyber: '#06b6d4' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; user-select: none !important; }
        .glass { @apply bg-white/10 dark:bg-slate-900/50 backdrop-blur-xl border border-white/20 dark:border-slate-800; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/30 rounded; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-btn { @apply opacity-0 group-hover:opacity-100 transition-opacity text-[10px] ml-2 cursor-pointer; }
    </style>
</head>
<body class="min-h-screen p-4">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg rounded-2xl mb-6">
        <div class="flex flex-col">
            <h1 class="text-xl font-black tracking-tighter text-cyber uppercase italic font-mono">Cyber Messenger</h1>
            <p class="text-[10px] font-bold opacity-60 tracking-widest uppercase">By: Moamen Abdelfattah</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="user-badge" class="hidden flex items-center gap-2 bg-cyber/10 px-3 py-1 rounded-full border border-cyber/20">
                <div class="w-2 h-2 bg-cyber rounded-full animate-pulse"></div>
                <span id="active-user" class="text-xs font-bold"></span>
            </div>
            <button onclick="logout()" id="logout-btn" class="hidden bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-red-500/20 hover:bg-red-500 hover:text-white transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <section id="auth-section" class="max-w-md mx-auto mt-12 glass p-8 rounded-[2rem] shadow-2xl border-t-4 border-cyber animate-slide-up">
            <h2 id="auth-title" class="text-center text-2xl font-black mb-8 uppercase italic text-cyber">Security Terminal</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Agent ID" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition">
                <input type="password" id="password" placeholder="Passcode" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition">
                <button onclick="handleAuth()" id="btn-main" class="w-full bg-cyber text-white p-4 rounded-xl font-black uppercase text-xs">Authorize Access</button>
                <div class="flex justify-between px-2 text-[10px] font-bold text-slate-500 uppercase mt-4">
                    <button onclick="toggleAuth()" id="toggle-text" class="cursor-pointer hover:text-cyber">Register Node</button>
                </div>
            </div>
        </section>

        <div id="chat-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-[78vh] animate-slide-up">
            <aside class="lg:col-span-4 glass rounded-[2rem] p-6 flex flex-col overflow-hidden">
                <h3 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em] mb-4">Active Nodes</h3>
                <input type="text" id="searchInput" oninput="loadUsers()" placeholder="Search handle..." class="mb-4 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none focus:ring-1 focus:ring-cyber transition">
                <div id="user-list" class="space-y-2 overflow-y-auto flex-1 pr-2 chat-area"></div>
            </aside>

            <div class="lg:col-span-8 glass rounded-[2rem] flex flex-col overflow-hidden relative">
                <div id="chat-header" class="p-5 border-b border-white/10 flex items-center justify-between bg-white/5">
                    <div class="flex items-center gap-3">
                        <div id="target-avatar" class="w-10 h-10 rounded-full bg-cyber/20 flex items-center justify-center font-bold text-cyber uppercase">?</div>
                        <div>
                            <h3 id="current-chat-name" class="font-bold text-sm uppercase">Select Agent</h3>
                            <p id="chat-status" class="text-[9px] opacity-40 uppercase font-black tracking-widest">RSA Idle</p>
                        </div>
                    </div>
                </div>
                <div id="msg-area" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area"></div>
                <div class="p-4 bg-white/5 border-t border-white/10 flex gap-3">
                    <input type="text" id="msg-input" placeholder="Type secure message..." class="flex-1 bg-slate-950 rounded-2xl p-4 text-sm outline-none focus:ring-1 focus:ring-cyber">
                    <button onclick="dispatchMessage()" class="bg-cyber p-4 rounded-2xl text-white shadow-xl hover:scale-105 active:scale-95 transition-all font-black text-xs uppercase">Send</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isLogin = true, currentUser = null, targetUser = null, lastMsgCount = 0, allCachedUsers = [];
        let myPrivKey = null, myPubKeyPem = null;
        const pki = forge.pki;

        // نفس سلوكك القديم: تسجيل خروج عند الريفريش لضمان الأمان
        window.onload = () => { localStorage.clear(); };

        function initKeys() {
            const pair = pki.rsa.generateKeyPair(1024);
            myPrivKey = pair.privateKey;
            myPubKeyPem = pki.publicKeyToPem(pair.publicKey);
        }

        async function handleAuth() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return alert("Fill all fields");

            initKeys(); // توليد مفاتيح فريش

            const res = await fetch(isLogin ? '/login' : '/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                // الحل الجذري: إرسال المفتاح Base64
                body: JSON.stringify({username: u, password: p, publicKey: btoa(myPubKeyPem)})
            });
            const data = await res.json();
            if(res.ok) {
                if(!isLogin) { alert("Registration Success. Login now."); location.reload(); return; }
                currentUser = data;
                startChat();
            } else alert(data.error);
        }

        function startChat() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('user-badge').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('active-user').innerText = "@" + currentUser.username;

            // تحديث المفتاح على السيرفر فوراً
            fetch('/update-key', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: currentUser.username, publicKey: btoa(myPubKeyPem)})
            });

            setInterval(syncAll, 1500); 
            setInterval(refreshUsers, 5000);
            refreshUsers();
        }

        async function dispatchMessage() {
            const input = document.getElementById('msg-input'), text = input.value.trim();
            if(!text || !targetUser) return;

            try {
                // سحب أحدث مفتاح وفكه من Base64
                const usersRes = await fetch('/users');
                const users = await usersRes.json();
                const freshTarget = users.find(u => u.username === targetUser.username);
                
                const pubKeyPem = atob(freshTarget.publicKey);
                const pubKey = pki.publicKeyFromPem(pubKeyPem);
                
                const encrypted = forge.util.encode64(pubKey.encrypt(forge.util.encodeUtf8(text), 'RSA-OAEP'));

                await fetch('/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sender: currentUser.username, receiver: targetUser.username, message: encrypted})
                });
                input.value = '';
            } catch(e) { alert("Encryption Error: Peer Sync Failed."); }
        }

        async function syncAll() {
            if(!currentUser || !targetUser) return;
            try {
                const res = await fetch(`/messages-full/${currentUser.username}/${targetUser.username}`);
                const msgs = await res.json();
                if (msgs.length === lastMsgCount) return;
                lastMsgCount = msgs.length;

                const area = document.getElementById('msg-area');
                area.innerHTML = msgs.map(m => {
                    let d = m.message;
                    const isMe = m.sender === currentUser.username;
                    if(!isMe) {
                        try {
                            const dec = myPrivKey.decrypt(forge.util.decode64(m.message), 'RSA-OAEP');
                            d = forge.util.decodeUtf8(dec);
                        } catch(e) { d = "🔒 [Secure Packet]"; }
                    }
                    return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up group">
                        <div class="${isMe ? 'bg-cyber text-black font-bold' : 'glass'} p-4 rounded-2xl max-w-[80%] text-sm shadow-xl">
                            <b class="text-[9px] opacity-50 block mb-1 uppercase">${m.sender}</b>
                            ${d}
                        </div></div>`;
                }).join('');
                area.scrollTop = area.scrollHeight;
            } catch(e) {}
        }

        async function refreshUsers() {
            const res = await fetch('/users');
            allCachedUsers = await res.json();
            loadUsers();
        }

        function loadUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('user-list');
            const filtered = allCachedUsers.filter(u => u.username.includes(q) && u.username !== currentUser.username);
            list.innerHTML = filtered.map(u => `
                <button onclick='setTarget(${JSON.stringify(u)})' class="w-full p-4 glass rounded-2xl mb-2 flex items-center gap-3 hover:bg-cyber/10 transition-all text-left">
                    <div class="w-8 h-8 rounded-full bg-cyber/20 flex items-center justify-center font-black text-cyber uppercase text-xs">${u.username[0]}</div>
                    <span class="font-bold text-xs uppercase tracking-tighter">@${u.username}</span>
                </button>`).join('');
        }

        function setTarget(u) {
            targetUser = u; lastMsgCount = 0;
            document.getElementById('current-chat-name').innerText = "@" + u.username;
            document.getElementById('target-avatar').innerText = u.username[0].toUpperCase();
            document.getElementById('chat-status').innerText = "Secure RSA Link Active";
            document.getElementById('msg-area').innerHTML = '';
        }

        function logout() { location.reload(); }
        function toggleAuth() { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? 'Security Terminal' : 'Registration'; }
    </script>
</body>
</html>
