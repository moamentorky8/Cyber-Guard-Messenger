<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER MESSENGER | MOAMEN ABDELFATTAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cyber: '#06b6d4' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; user-select: none !important; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { @apply bg-white/10 dark:bg-slate-900/50 backdrop-blur-xl border border-white/20 dark:border-slate-800; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/30 rounded; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-btn { @apply opacity-0 group-hover:opacity-100 transition-all text-[12px] ml-2 cursor-pointer hover:text-cyber inline-block; }
        .notification-dot { @apply w-2 h-2 bg-red-500 rounded-full absolute top-2 right-2 animate-pulse; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 min-h-screen p-4 flex flex-col">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg rounded-2xl mb-6">
        <div class="flex flex-col">
            <h1 class="text-xl font-black tracking-tighter text-cyber uppercase italic font-mono">Cyber Messenger</h1>
            <p class="text-[10px] font-bold opacity-60 tracking-widest uppercase">Prepared by: Moamen Abdelfattah</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-2 rounded-xl bg-white/5 hover:bg-white/10 transition shadow-inner">
                <span id="theme-icon" class="text-lg">🌙</span>
            </button>
            <div id="user-badge-nav" class="hidden flex items-center gap-2 bg-cyber/10 px-3 py-1 rounded-full border border-cyber/20">
                <div class="w-2 h-2 bg-cyber rounded-full animate-pulse"></div>
                <span id="active-user" class="text-xs font-bold mono"></span>
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto w-full flex-1 flex flex-col">
        <section id="auth-section" class="max-w-md mx-auto mt-12 w-full glass p-8 rounded-[2rem] shadow-2xl border-t-4 border-cyber animate-slide-up">
            <h2 id="auth-title" class="text-center text-2xl font-black mb-8 uppercase italic text-cyber">Security Terminal</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Agent ID" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white text-center font-bold outline-none focus:ring-2 focus:ring-cyber">
                <input type="password" id="password" placeholder="Passcode" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white text-center font-bold outline-none focus:ring-2 focus:ring-cyber">
                <button onclick="handleAuth()" class="w-full bg-cyber text-black p-4 rounded-xl font-black uppercase text-xs shadow-lg hover:scale-[1.02] transition-transform">Authorize Access</button>
                <button onclick="toggleAuth()" id="toggle-text" class="w-full text-center text-[10px] font-bold text-slate-500 hover:text-cyber uppercase mt-2">Initialize New Node</button>
            </div>
        </section>

        <div id="chat-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-4 h-[80vh] animate-slide-up overflow-hidden">
            <aside class="lg:col-span-3 glass rounded-[2rem] p-5 flex flex-col overflow-hidden relative">
                <p class="text-[9px] font-black text-cyber uppercase mb-4 tracking-widest italic border-b border-white/5 pb-2">Historical Inbox</p>
                <div id="inbox-list" class="flex-1 overflow-y-auto space-y-2 chat-area pb-20"></div>
                <div class="absolute bottom-4 left-4 right-4">
                    <button onclick="location.reload()" class="w-full bg-red-500/20 text-red-500 p-3 rounded-xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition">Logout</button>
                </div>
            </aside>

            <main class="lg:col-span-6 glass rounded-[2rem] flex flex-col overflow-hidden relative border-x border-white/5">
                <div id="chat-header" class="p-4 border-b border-white/10 flex items-center justify-between bg-white/5">
                    <div class="flex items-center gap-3">
                        <div id="target-avatar" class="w-10 h-10 rounded-full bg-cyber/20 flex items-center justify-center font-black text-cyber font-mono uppercase">?</div>
                        <div>
                            <h3 id="t-name" class="font-bold text-sm uppercase italic text-white font-mono">Select Node</h3>
                            <p id="t-status" class="text-[8px] opacity-40 uppercase font-black tracking-tighter text-cyber">E2EE_ACTIVE</p>
                        </div>
                    </div>
                </div>
                <div id="msgs-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area bg-slate-900/10 font-mono text-xs text-white"></div>
                <div class="p-4 bg-black/20 flex gap-3 items-center">
                    <input type="text" id="m-input" placeholder="Type secure message..." class="flex-1 bg-transparent outline-none text-sm px-4 text-white">
                    <button onclick="dispatchMsg()" class="bg-cyber text-black p-3 rounded-xl font-black hover:scale-105 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                    </button>
                </div>
            </main>

            <aside class="lg:col-span-3 glass rounded-[2rem] p-5 flex flex-col overflow-hidden">
                <p class="text-[9px] font-black text-cyber uppercase mb-4 tracking-widest italic border-b border-white/5 pb-2">Node Discovery</p>
                <input type="text" id="searchInput" oninput="loadUsers()" placeholder="Search Agent..." class="mb-4 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none focus:ring-1 focus:ring-cyber transition text-white w-full uppercase">
                <div id="user-list" class="flex-1 overflow-y-auto space-y-2 chat-area"></div>
            </aside>
        </div>
    </main>

    <script>
        let isLogin = false, me = null, target = null, lastLen = 0, usersRaw = [];
        const pki = forge.pki;

        // ثبات المفاتيح في الجلسة الواحدة
        const pair = pki.rsa.generateKeyPair(1024);
        const myPubPem = pki.publicKeyToPem(pair.publicKey);
        const myPriv = pair.privateKey;

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('theme-icon').innerText = html.classList.contains('dark') ? '🌙' : '☀️';
        }

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Agent Login' : 'Security Terminal';
            document.getElementById('toggle-text').innerText = isLogin ? 'New Identity? Register' : 'Switch to Login';
        }

        async function handleAuth() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return alert("Credentials Missing");
            const endpoint = isLogin ? '/login' : '/register';
            try {
                const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p, publicKey: myPubPem})});
                const data = await res.json();
                if(res.ok) { me = data; enterTerminal(); } else alert(data.error);
            } catch (e) { alert("Connection Denied."); }
        }

        function enterTerminal() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('user-badge-nav').classList.remove('hidden');
            document.getElementById('active-user').innerText = "@" + me.username;
            loadUsers();
            setInterval(syncSystem, 2000);
        }

        async function loadUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            try {
                const res = await fetch(`/users?search=${q}`);
                usersRaw = await res.json();
                document.getElementById('user-list').innerHTML = usersRaw.map(u => {
                    if(u.username === me.username) return '';
                    return `<div onclick="setTarget('${u.username}', \`${u.publicKey}\`)" class="p-3 glass rounded-xl cursor-pointer hover:bg-cyber/10 mb-1 border border-white/5 flex justify-between items-center transition-all animate-slide-up">
                        <span class="text-[10px] font-black uppercase text-white">@${u.username}</span>
                        <div class="w-1.5 h-1.5 rounded-full ${u.status === 'online' ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : 'bg-slate-700'}"></div>
                    </div>`;
                }).join('');
            } catch (e) {}
        }

        function setTarget(name, pubKey) {
            target = { username: name, publicKey: pubKey.trim() };
            document.getElementById('t-name').innerText = name.toUpperCase();
            document.getElementById('target-avatar').innerText = name[0].toUpperCase();
            document.getElementById('msgs-box').innerHTML = '';
            lastLen = 0;
            syncSystem();
        }

        async function dispatchMsg() {
            const input = document.getElementById('m-input'), txt = input.value.trim();
            if(!txt || !target) return;
            try {
                // تشفير للمستقبل
                const tPub = pki.publicKeyFromPem(target.publicKey);
                const mRec = forge.util.encode64(tPub.encrypt(txt));
                // تشفير لنفسي (عشان تظهر في الهيستوري)
                const mMe = forge.util.encode64(pki.publicKeyFromPem(myPubPem).encrypt(txt));

                const res = await fetch('/send', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        sender: me.username, 
                        receiver: target.username, 
                        message: mRec, 
                        senderCopy: mMe // الحقل ده هو اللي بيحفظ الهيستوري عندك
                    }) 
                });
                if(res.ok) { input.value = ''; syncSystem(); }
            } catch (e) { alert("Encryption Fault."); }
        }

        async function syncSystem() {
            if(!me) return;
            try {
                const res = await fetch(`/messages/${me.username}`);
                const msgs = await res.json();
                
                // تحديث الإنبوكس (الجانب الأيسر)
                const inboxData = {};
                msgs.forEach(m => {
                    const peer = m.sender === me.username ? m.receiver : m.sender;
                    if(!inboxData[peer]) inboxData[peer] = m;
                });

                document.getElementById('inbox-list').innerHTML = Object.keys(inboxData).map(s => {
                    let preview = "🔒 Secured";
                    try {
                        const m = inboxData[s];
                        const dec = myPriv.decrypt(forge.util.decode64(m.sender === me.username ? m.senderCopy : m.message));
                        preview = dec.substring(0, 15);
                    } catch(e) {}
                    return `<div onclick="openFromInbox('${s}')" class="p-3 glass rounded-xl cursor-pointer border-l-2 border-cyber mb-2 hover:bg-cyber/10 relative transition-all">
                        <div class="notification-dot"></div><p class="text-[9px] font-black uppercase text-cyber">@${s}</p>
                        <p class="text-[10px] opacity-70 truncate text-white italic">${preview}...</p>
                    </div>`;
                }).join('');

                // تحديث الشات (الهيستوري)
                if(target) {
                    const box = document.getElementById('msgs-box');
                    const chatMsgs = msgs.filter(m => (m.sender === target.username && m.receiver === me.username) || (m.sender === me.username && m.receiver === target.username));
                    
                    if(chatMsgs.length !== lastLen) {
                        box.innerHTML = chatMsgs.map(m => {
                            const isMe = m.sender === me.username;
                            let d = "";
                            try { d = myPriv.decrypt(forge.util.decode64(isMe ? m.senderCopy : m.message)); } catch(e) { d = "🔒 Decryption Fail"; }
                            return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up group">
                                <div class="${isMe ? 'bg-cyber text-black font-black' : 'glass text-white'} p-3 rounded-2xl max-w-[85%] mb-2 shadow-lg relative">
                                    <p class="text-[7px] opacity-50 mb-1 uppercase">${m.sender}</p>
                                    <p class="text-xs">${d}</p>
                                    ${isMe ? `<div class="mt-1 border-t border-black/10 pt-1 text-right">
                                        <span onclick="ui_edit('${m.id}')" class="msg-btn">✎</span>
                                        <span onclick="ui_del('${m.id}')" class="msg-btn text-red-600">✖</span>
                                    </div>` : ''}
                                </div></div>`;
                        }).join('');
                        lastLen = chatMsgs.length;
                        box.scrollTop = box.scrollHeight;
                    }
                }
            } catch (e) {}
        }

        async function ui_edit(id) {
            const n = prompt("Edit payload:");
            if(n) {
                // لازم نشفر التعديل برضه عشان يفضل محمي
                const tPub = pki.publicKeyFromPem(target.publicKey);
                const mRec = forge.util.encode64(tPub.encrypt(n));
                const mMe = forge.util.encode64(pki.publicKeyFromPem(myPubPem).encrypt(n));
                await fetch('/edit-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, newVal: mRec, senderCopy: mMe})});
                syncSystem();
            }
        }
        async function ui_del(id) {
            if(confirm("Destroy packet?")) {
                await fetch('/del-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id})});
                syncSystem();
            }
        }
        function openFromInbox(s) {
            const user = usersRaw.find(u => u.username === s);
            if(user) setTarget(user.username, user.publicKey);
        }
    </script>
</body>
</html>
