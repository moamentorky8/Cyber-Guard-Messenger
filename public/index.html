<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER MESSENGER | ELITE EDITION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { extend: { colors: { cyber: '#06b6d4' } } } 
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            user-select: none !important; 
            transition: background 0.5s ease;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { @apply bg-white/5 dark:bg-slate-900/40 backdrop-blur-3xl border border-white/10 dark:border-slate-800/60; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/50 rounded-full; }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .msg-btn { @apply opacity-0 group-hover:opacity-100 transition-all duration-300 text-[9px] font-black uppercase cursor-pointer hover:text-white px-2 py-1 rounded-md bg-white/5; }
        .notification-dot { @apply w-3 h-3 bg-red-500 rounded-full absolute top-2 right-2 border-2 border-[#020617] animate-pulse shadow-[0_0_10px_#ef4444]; }
        input { @apply focus:ring-2 focus:ring-cyber/40 outline-none transition-all duration-300; }
        .active-ring { @apply ring-2 ring-cyber shadow-[0_0_20px_rgba(6,182,212,0.3)]; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <nav class="max-w-7xl mx-auto glass sticky top-0 z-[200] px-10 py-6 flex justify-between items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] rounded-[2rem] mb-10 border-b border-cyber/30">
        <div class="flex flex-col">
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 bg-cyber rounded-sm rotate-45 animate-spin-slow shadow-[0_0_15px_#06b6d4]"></div>
                <h1 class="text-3xl font-black tracking-[calc(-0.05em)] text-cyber uppercase italic font-mono">Cyber Messenger</h1>
            </div>
            <p class="text-[10px] font-bold opacity-40 tracking-[0.5em] uppercase mt-2 pl-7">Lead Architecture by: Moamen Abdelfattah</p>
        </div>
        
        <div class="flex items-center gap-8">
            <div id="user-badge" class="hidden flex items-center gap-4 bg-cyber/10 px-6 py-2.5 rounded-2xl border border-cyber/20 backdrop-blur-2xl">
                <div class="flex flex-col items-end">
                    <span id="active-user" class="text-sm font-black text-white font-mono tracking-tight"></span>
                    <span class="text-[9px] font-black text-cyber uppercase tracking-[0.2em] flex items-center gap-1">
                        <span class="w-1 h-1 bg-green-400 rounded-full animate-ping"></span> 
                        Encryption Tunnel Active
                    </span>
                </div>
            </div>
            <button onclick="terminateGlobalSession()" id="logout-btn" class="hidden group bg-red-500/10 hover:bg-red-500 p-4 rounded-2xl transition-all duration-500 border border-red-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto">
        
        <section id="auth-section" class="max-w-lg mx-auto mt-24 glass p-12 rounded-[4rem] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.7)] border-t border-cyber/50 animate-slide-up">
            <div class="text-center mb-12">
                <div class="inline-flex p-5 rounded-[2rem] bg-cyber/5 mb-6 border border-cyber/20 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-cyber" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h2 id="auth-title" class="text-4xl font-black uppercase italic tracking-tighter text-white">Identity Auth</h2>
                <p class="text-[11px] opacity-30 uppercase tracking-[0.5em] mt-3">Advanced RSA Cryptosystem</p>
            </div>
            
            <div class="space-y-6">
                <input type="text" id="username" placeholder="AGENT_SERIAL_NUMBER" class="w-full bg-slate-950/80 border border-slate-800 rounded-2xl p-6 text-sm font-mono tracking-widest text-cyber">
                <input type="password" id="password" placeholder="PASSCODE_KEY" class="w-full bg-slate-950/80 border border-slate-800 rounded-2xl p-6 text-sm font-mono tracking-widest text-cyber">
                
                <button onclick="processSystemAuthorization()" id="btn-main" class="w-full bg-cyber hover:bg-cyan-500 text-white p-6 rounded-3xl font-black uppercase text-xs shadow-2xl shadow-cyber/30 tracking-[0.3em] transition-all hover:-translate-y-1 active:scale-95">Verify & Initialize</button>
                
                <div class="flex justify-between items-center px-4 text-[10px] font-black text-slate-500 uppercase tracking-widest pt-6 border-t border-white/5">
                    <button onclick="switchAuthenticationMode()" id="toggle-text" class="hover:text-cyber transition-all">New Node Registration</button>
                    <button onclick="emergencyCredentialReset()" class="hover:text-red-400 transition-all">Override Key</button>
                </div>
            </div>
        </section>

        <section id="setup-section" class="hidden max-w-lg mx-auto mt-24 glass p-12 rounded-[4rem] border-t-2 border-green-500 animate-slide-up shadow-2xl shadow-green-500/10">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-black uppercase italic tracking-tighter text-green-500">Handle Setup</h2>
                <p class="text-[10px] opacity-40 uppercase tracking-[0.4em] mt-2">Public Identity Allocation</p>
            </div>
            <div class="space-y-6">
                <input type="text" id="new-handle" placeholder="@global_identifier" class="w-full bg-slate-950/80 border border-slate-800 rounded-2xl p-6 text-sm font-mono tracking-tighter">
                <button onclick="finalizeGlobalIdentity()" class="w-full bg-green-500 text-white p-6 rounded-3xl font-black uppercase text-xs shadow-xl shadow-green-500/20 tracking-widest transition-all hover:brightness-110 active:scale-95">Synchronize Identity</button>
            </div>
        </section>

        <div id="chat-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-10 h-[82vh] animate-slide-up">
            
            <aside class="lg:col-span-4 glass rounded-[3rem] p-10 flex flex-col overflow-hidden border border-white/5 shadow-2xl relative">
                <div class="mb-10">
                    <h3 class="text-[11px] font-black opacity-30 uppercase tracking-[0.5em] mb-6">Discovery Pulse</h3>
                    <div class="relative group">
                        <input type="text" id="searchInput" oninput="executeDynamicNodeSearch()" placeholder="Scan for handles..." class="w-full bg-slate-950/60 border border-slate-800 rounded-[1.5rem] p-5 pl-12 text-xs group-focus-within:border-cyber/50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-4 top-5 opacity-20 group-focus-within:text-cyber group-focus-within:opacity-100 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                </div>

                <div id="user-list" class="space-y-4 overflow-y-auto mb-8 border-b border-white/5 pb-8 max-h-[220px]"></div>

                <div class="flex-1 flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[11px] font-black text-cyber uppercase tracking-[0.5em]">Active Requests</h3>
                        <span id="req-badge" class="bg-cyber/20 text-cyber text-[9px] font-black px-3 py-1 rounded-full border border-cyber/30">0</span>
                    </div>
                    <div id="inbox-list" class="flex-1 space-y-4 overflow-y-auto pr-4">
                        <div class="text-center py-20 opacity-20 italic text-[11px] uppercase tracking-widest font-mono">Standby for data...</div>
                    </div>
                </div>
                
                <div class="mt-8 border-t border-white/10 pt-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[11px] font-black opacity-30 uppercase tracking-[0.5em]">Secure Sectors</h3>
                        <button onclick="deployNewSecureSector()" class="text-cyber hover:text-white font-black text-[10px] transition-all uppercase tracking-widest border-b border-cyber/30">+ New Link</button>
                    </div>
                    <div id="group-list" class="space-y-4 overflow-y-auto max-h-[200px]"></div>
                </div>
            </aside>

            <div class="lg:col-span-8 glass rounded-[3rem] flex flex-col overflow-hidden border border-white/5 shadow-2xl relative">
                <header id="chat-header" class="px-10 py-8 border-b border-white/10 flex items-center justify-between bg-slate-900/40 backdrop-blur-3xl">
                    <div class="flex items-center gap-6">
                        <div id="target-avatar" class="w-14 h-14 rounded-[1.25rem] bg-cyber/10 flex items-center justify-center font-black text-cyber text-xl shadow-[inset_0_0_15px_rgba(6,182,212,0.2)] border border-cyber/20">?</div>
                        <div>
                            <h3 id="current-chat-name" class="font-black text-lg uppercase tracking-tight text-white italic">Node Terminal</h3>
                            <div class="flex items-center gap-2.5 mt-1">
                                <span class="w-2 h-2 bg-slate-600 rounded-full" id="status-bulb"></span>
                                <p id="chat-status" class="text-[10px] opacity-40 uppercase font-black tracking-[0.2em] font-mono">Offline_Standby</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button id="add-mem-btn" onclick="authorizeNodeInSector()" class="hidden bg-green-500/10 text-green-500 text-[10px] px-6 py-3 rounded-2xl font-black uppercase border border-green-500/20 hover:bg-green-500 hover:text-white transition-all">Authorize User</button>
                        <button id="delete-group-btn" onclick="terminateSectorProtocol()" class="hidden bg-red-500/10 text-red-500 text-[10px] px-6 py-3 rounded-2xl font-black uppercase border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">Terminate Sector</button>
                    </div>
                </header>

                <div id="msg-area" class="flex-1 overflow-y-auto p-10 space-y-8 chat-area bg-gradient-to-b from-transparent to-slate-950/20"></div>

                <footer class="p-8 bg-slate-900/60 border-t border-white/10 backdrop-blur-2xl">
                    <div class="flex gap-5 items-center bg-slate-950/80 p-3 rounded-[2.5rem] border border-white/10 shadow-2xl">
                        <input type="text" id="msg-input" placeholder="Type encrypted transmission..." class="flex-1 bg-transparent border-none rounded-2xl p-4 text-sm font-medium tracking-wide">
                        <button onclick="dispatchSecurePacket()" class="bg-cyber hover:bg-cyan-400 p-5 rounded-full text-white shadow-[0_0_25px_rgba(6,182,212,0.4)] transition-all duration-300 hover:scale-110 active:scale-90">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </button>
                    </div>
                </footer>
            </div>
        </div>
    </main>

    <script>
        /**
         * GLOBAL ENGINE STATE
         */
        let isLogin = true;
        let currentUser = null;
        let targetUser = null;
        let activeGroup = null;
        let lastMsgCount = 0;
        let allCachedUsers = [];
        let myPrivKey = null;
        let myPubKeyPem = null;
        const pki = forge.pki;

        /**
         * CORE PERSISTENCE BOOTLOADER
         * Recovers session data on page load
         */
        window.onload = async function() {
            const persistedSession = localStorage.getItem('cyber_vault_session');
            if (persistedSession) {
                currentUser = JSON.parse(persistedSession);
                console.log("%c[DECRYPTOR]: Recovering Session for Node " + currentUser.username, "color: #06b6d4; font-weight: bold;");
                await initializeCryptographicIdentity(currentUser.username);
                bootCommandInterface();
            }
        };

        /**
         * CRYPTOGRAPHIC IDENTITY INITIALIZER
         * Manages E2EE keypairs and hardware linking
         */
        async function initializeCryptographicIdentity(username) {
            const PRIV_IDENTIFIER = `cyber_vault_priv_${username}`;
            const PUB_IDENTIFIER = `cyber_vault_pub_${username}`;
            
            const vaultPrivate = localStorage.getItem(PRIV_IDENTIFIER);
            const vaultPublic = localStorage.getItem(PUB_IDENTIFIER);

            if (vaultPrivate && vaultPublic) {
                myPrivKey = pki.privateKeyFromPem(vaultPrivate);
                myPubKeyPem = vaultPublic;
                console.log("%c[CRYPTO]: Private Key Extracted from Local Vault", "color: #10b981;");
            } else {
                console.warn("[CRYPTO]: Key Missing. Generating New 1024-bit RSA Engine...");
                const pair = pki.rsa.generateKeyPair(1024);
                myPrivKey = pair.privateKey;
                myPubKeyPem = pki.publicKeyToPem(pair.publicKey);
                
                // Secure Persistent Storage
                localStorage.setItem(PRIV_IDENTIFIER, pki.privateKeyToPem(myPrivKey));
                localStorage.setItem(PUB_IDENTIFIER, myPubKeyPem);
            }
        }

        /**
         * AUTHENTICATION LOGIC FLOW
         */
        async function processSystemAuthorization() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return alert("ACCESS DENIED: Credentials Missing.");

            await initializeCryptographicIdentity(user);

            const path = isLogin ? '/login' : '/register';
            try {
                const res = await fetch(path, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, password: pass, publicKey: myPubKeyPem })
                });
                const data = await res.json();
                
                if(res.ok) {
                    currentUser = data;
                    localStorage.setItem('cyber_vault_session', JSON.stringify(data)); // Persistent Session
                    if(!isLogin || !data.handle) showIdentityConfiguration();
                    else bootCommandInterface();
                } else alert("FIREWALL REJECT: " + data.error);
            } catch(e) { alert("NETWORK BLACKOUT: Server Unreachable."); }
        }

        /**
         * BOOT COMMAND INTERFACE
         * Initializes UI components and high-freq synchronization
         */
        async function bootCommandInterface() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('user-badge').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('active-user').innerText = "@" + (currentUser.handle || currentUser.username);

            // Mandatory Public Key Synchronization with Cloud
            await fetch('/update-key', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: currentUser.username, publicKey: myPubKeyPem })
            });

            // Parallel Processors
            setInterval(executeNeuralSynchronization, 1500); 
            setInterval(reconstructUserDirectory, 6000);
            
            reconstructUserDirectory();
            executeSectorCatalogRefresh();
        }

        /**
         * SECURE PACKET DISPATCHER
         * RSA-OAEP Encryption Logic
         */
        async function dispatchSecurePacket() {
            const input = document.getElementById('msg-input');
            const data = input.value.trim();
            if(!data) return;

            try {
                if(targetUser) {
                    const pubKeyInstance = pki.publicKeyFromPem(targetUser.publicKey);
                    const binaryCipher = pubKeyInstance.encrypt(data, 'RSA-OAEP');
                    const encodedPayload = forge.util.encode64(binaryCipher);

                    await fetch('/send', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            sender: currentUser.username,
                            receiver: targetUser.username,
                            message: encodedPayload
                        })
                    });
                } else if(activeGroup) {
                    await fetch('/send-group', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            groupId: activeGroup.groupId,
                            sender: currentUser.username,
                            message: data
                        })
                    });
                }
                input.value = '';
            } catch (err) {
                alert("ENCRYPTION ERROR: Cryptographic tunnel collapsed.");
            }
        }

        /**
         * NEURAL SYNCHRONIZATION ENGINE
         * High efficiency background polling and decryption
         */
        async function executeNeuralSynchronization() {
            if(!currentUser) return;

            // BACKGROUND PROCESS: Inbox Monitoring
            try {
                const inboxFetch = await fetch(`/messages/${currentUser.username}`);
                const rawIncoming = await inboxFetch.json();
                const inboxView = document.getElementById('inbox-list');
                
                const inboxMap = {};
                rawIncoming.forEach(p => {
                    if(!inboxMap[p.sender]) {
                        try {
                            const dec = myPrivKey.decrypt(forge.util.decode64(p.message), 'RSA-OAEP');
                            inboxMap[p.sender] = { text: dec };
                        } catch(e) { inboxMap[p.sender] = { text: "🔒 Secure Channel Established" }; }
                    }
                });

                if (Object.keys(inboxMap).length > 0) {
                    document.getElementById('req-badge').innerText = Object.keys(inboxMap).length;
                    inboxView.innerHTML = Object.keys(inboxMap).map(sid => `
                        <div onmousedown="openTerminalFromInbox('${sid}')" class="p-5 glass rounded-3xl cursor-pointer relative hover:bg-cyber/10 border-l-[6px] border-cyber transition-all animate-slide-up">
                            <div class="notification-dot"></div>
                            <p class="text-[11px] font-black uppercase text-white tracking-widest font-mono">NODE_${sid}</p>
                            <p class="text-[10px] opacity-50 truncate mt-2 italic font-mono text-cyber">${inboxMap[sid].text}</p>
                        </div>`).join('');
                }
            } catch(e) {}

            // TERMINAL FOCUS: Chat Frame Update
            if(!targetUser && !activeGroup) return;
            
            const endpoint = targetUser ? `/messages-full/${currentUser.username}/${targetUser.username}` : `/group-messages/${activeGroup.groupId}`;
            const terminalStream = await fetch(endpoint);
            const msgStack = await terminalStream.json();

            // Resource optimization logic
            if (msgStack.length === lastMsgCount && lastMsgCount !== 0) return;
            lastMsgCount = msgStack.length;

            const area = document.getElementById('msg-area');
            area.innerHTML = '';
            msgStack.forEach(msg => {
                let decryptedContent = msg.message;
                if(targetUser && msg.sender !== currentUser.username) {
                    try { decryptedContent = myPrivKey.decrypt(forge.util.decode64(msg.message), 'RSA-OAEP'); }
                    catch(e) { decryptedContent = "<span class='text-red-500'>[ERROR: DECRYPTION_FAILURE]</span>"; }
                }

                const isSelf = msg.sender === currentUser.username;
                area.innerHTML += `
                    <div class="flex ${isSelf ? 'justify-end' : 'justify-start'} animate-slide-up group">
                        <div class="${isSelf ? 'bg-cyber text-white' : 'glass border border-white/10 shadow-2xl'} p-6 rounded-[2rem] ${isSelf ? 'rounded-tr-none' : 'rounded-tl-none'} text-sm max-w-[85%] relative transition-all duration-300">
                            <span class="text-[10px] font-black uppercase opacity-40 block mb-2 tracking-[0.2em] font-mono">${msg.sender}</span>
                            <div class="font-semibold leading-relaxed">${decryptedContent}</div>
                            ${isSelf ? `
                                <div class="mt-4 pt-3 border-t border-white/20 flex gap-4">
                                    <span class="msg-btn" onclick="executePayloadModification('${msg.id}')">EDIT</span>
                                    <span class="msg-btn text-red-400 hover:text-red-200" onclick="executePayloadVoiding('${msg.id}')">VOID</span>
                                </div>` : ''}
                        </div>
                    </div>`;
            });
            area.scrollTop = area.scrollHeight;
        }

        /**
         * NODE MANAGEMENT LOGIC
         */
        async function executeDynamicNodeSearch() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            const list = document.getElementById('user-list');
            if(!q) { list.innerHTML = ''; return; }
            const filtered = allCachedUsers.filter(u => u.handle.toLowerCase().includes(q) && u.username !== currentUser.username);
            list.innerHTML = filtered.map(u => `
                <button onmousedown="initiateSecureLink('${u.username}', '${u.handle}', '${btoa(u.publicKey)}')" class="w-full p-5 rounded-[1.5rem] glass flex items-center gap-5 hover:bg-cyber/20 hover:border-cyber/50 text-left active:scale-95 transition-all">
                    <div class="w-12 h-12 rounded-xl bg-cyber/10 flex items-center justify-center font-black text-cyber border border-cyber/20 text-lg">${u.handle[0].toUpperCase()}</div>
                    <div>
                        <span class="text-sm font-black uppercase text-white tracking-tight">@${u.handle}</span>
                        <div class="text-[9px] text-cyber font-bold uppercase tracking-widest mt-1">${u.status}</div>
                    </div>
                </button>`).join('');
        }

        function initiateSecureLink(un, h, pk) {
            targetUser = { username: un, handle: h, publicKey: atob(pk) };
            activeGroup = null; lastMsgCount = 0;
            document.getElementById('current-chat-name').innerText = "SECURE_LINK: @" + h;
            document.getElementById('target-avatar').innerText = h[0].toUpperCase();
            document.getElementById('chat-status').innerText = "ENCRYPTED RSA TUNNEL ACTIVE";
            document.getElementById('status-bulb').className = "w-2 h-2 bg-cyber rounded-full animate-pulse shadow-[0_0_15px_#06b6d4]";
            document.getElementById('msg-area').innerHTML = '';
            document.getElementById('add-mem-btn').classList.add('hidden');
            document.getElementById('delete-group-btn').classList.add('hidden');
        }

        async function executeSectorCatalogRefresh() {
            const r = await fetch(`/my-groups/${currentUser.username}`);
            const catalog = await r.json();
            document.getElementById('group-list').innerHTML = Object.keys(catalog).map(id => `
                <button onmousedown="activateSectorTerminal('${id}', '${catalog[id].name}', '${catalog[id].creator}')" class="w-full p-5 glass rounded-[1.5rem] font-black uppercase text-[11px] text-cyber border-l-4 border-cyber/50 text-left hover:bg-cyber/10 mb-2 transition-all"># SECTOR_${catalog[id].name}</button>`).join('');
        }

        function activateSectorTerminal(id, name, creator) {
            activeGroup = { groupId: id, name, creator };
            targetUser = null; lastMsgCount = 0;
            document.getElementById('current-chat-name').innerText = "SECTOR: " + name;
            document.getElementById('target-avatar').innerText = "#";
            document.getElementById('status-bulb').className = "w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_15px_#22c55e]";
            document.getElementById('chat-status').innerText = "BROADCAST TRANSMISSION LIVE";
            document.getElementById('add-mem-btn').classList.remove('hidden');
            if(creator === currentUser.username) document.getElementById('delete-group-btn').classList.remove('hidden');
            document.getElementById('msg-area').innerHTML = '';
        }

        function openTerminalFromInbox(handle) {
            const u = allCachedUsers.find(x => x.username === handle || x.handle === handle);
            if(u) initiateSecureLink(u.username, u.handle, btoa(u.publicKey));
        }

        /**
         * SYSTEM CONTROL FUNCTIONS
         */
        function terminateGlobalSession() {
            if(confirm("WIPE LOCAL SESSION AND TERMINATE LINK?")) {
                localStorage.removeItem('cyber_vault_session');
                location.reload();
            }
        }

        async function executePayloadModification(msgId) {
            const n = prompt("ENTER NEW PAYLOAD DATA:");
            if(n) { await fetch('/edit-message', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msgId, newVal: n, sender: currentUser.username})}); lastMsgCount = 0; }
        }

        async function executePayloadVoiding(msgId) {
            if(confirm("VOID DATA?")) { await fetch('/delete-message', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msgId, sender: currentUser.username})}); lastMsgCount = 0; }
        }

        async function reconstructUserDirectory() { const res = await fetch('/users'); allCachedUsers = await res.json(); }
        function toggleAuthInterface() { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? 'Identity Auth' : 'Node Register'; document.getElementById('btn-main').innerText = isLogin ? 'Verify & Initialize' : 'Register Node'; }
        function showIdentityConfiguration() { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('setup-section').classList.remove('hidden'); }
        async function finalizeGlobalIdentity() { const h = document.getElementById('new-handle').value.trim().toLowerCase(); await fetch('/add-member', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser.username, handle: h})}); currentUser.handle = h; localStorage.setItem('cyber_vault_session', JSON.stringify(currentUser)); bootCommandInterface(); }
        async function emergencyCredentialReset() { const u = prompt("ID:"), p = prompt("NEW_KEY:"); const r = await fetch('/reset-password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, newPassword:p})}); if(r.ok) alert("IDENTITY OVERRIDDEN"); }
        async function deployNewSecureSector() { const n = prompt("NAME:"); if(n) { await fetch('/create-group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({groupName: n, creator: currentUser.username})}); executeSectorCatalogRefresh(); } }
        async function authorizeNodeInSector() { const h = prompt("@HANDLE:"); const res = await fetch('/add-member-by-handle', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ groupId: activeGroup.groupId, handle: h.replace('@','') }) }); if(res.ok) alert("NODE AUTHORIZED"); }
        async function terminateSectorProtocol() { if(confirm("VOID SECTOR?")) { await fetch('/delete-group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({groupId: activeGroup.groupId, username: currentUser.username})}); activeGroup = null; executeSectorCatalogRefresh(); document.getElementById('msg-area').innerHTML = ''; } }
    </script>
</body>
