<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER CHAT | MOAMEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        body { background: #020617; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="p-4">
    <div id="auth-box" class="max-w-md mx-auto mt-20 glass p-8 rounded-3xl border-t-4 border-cyan-500">
        <h2 id="auth-head" class="text-2xl font-black mb-6 text-center italic text-cyan-500">CYBER LOGIN</h2>
        <div class="space-y-4">
            <input type="text" id="user-in" placeholder="Username" class="w-full bg-black/40 p-4 rounded-xl outline-none border border-white/10">
            <input type="password" id="pass-in" placeholder="Password" class="w-full bg-black/40 p-4 rounded-xl outline-none border border-white/10">
            <button onclick="auth()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold">ENTER SYSTEM</button>
            <div class="flex justify-between text-[10px] opacity-50 px-2 uppercase font-bold">
                <span onclick="toggleAuth()" class="cursor-pointer hover:text-white">Switch Mode</span>
                <span onclick="resetPass()" class="cursor-pointer hover:text-white">Reset Password</span>
            </div>
        </div>
    </div>

    <div id="setup-box" class="hidden max-w-md mx-auto mt-20 glass p-8 rounded-3xl border-t-4 border-green-500">
        <h2 class="text-xl font-bold mb-4 text-center">CHOOSE YOUR @HANDLE</h2>
        <input type="text" id="handle-in" placeholder="@nickname" class="w-full bg-black/40 p-4 rounded-xl mb-4">
        <button onclick="saveHandle()" class="w-full bg-green-600 p-4 rounded-xl font-bold">SAVE IDENTITY</button>
    </div>

    <div id="app-ui" class="hidden grid grid-cols-12 gap-4 h-[90vh]">
        <div class="col-span-4 glass rounded-3xl p-4 flex flex-col overflow-hidden">
            <input type="text" oninput="searchUsers()" id="search-in" placeholder="Search Agents..." class="w-full bg-white/5 p-3 rounded-xl mb-4 outline-none text-xs">
            <div id="user-results" class="space-y-2 overflow-y-auto mb-4 border-b border-white/5 pb-2"></div>
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold opacity-40">SECURE GROUPS</span>
                <button onclick="newGroup()" class="text-cyan-500 text-[10px] font-bold">+ CREATE</button>
            </div>
            <div id="group-results" class="space-y-2 overflow-y-auto flex-1"></div>
        </div>

        <div class="col-span-8 glass rounded-3xl flex flex-col overflow-hidden relative">
            <div class="p-4 border-b border-white/10 flex justify-between items-center">
                <div>
                    <h3 id="chat-title" class="font-bold text-cyan-500 uppercase">Select Target</h3>
                    <p id="chat-sub" class="text-[9px] opacity-40">ENCRYPTED CONNECTION</p>
                </div>
                <div class="flex gap-2">
                    <button id="add-btn" class="hidden bg-green-500/20 text-green-500 text-[9px] px-3 py-1 rounded-full font-bold" onclick="addMem()">+ MEMBER</button>
                    <button id="del-btn" class="hidden bg-red-500/20 text-red-500 text-[9px] px-3 py-1 rounded-full font-bold" onclick="delGrp()">DELETE GROUP</button>
                </div>
            </div>
            <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 space-y-4 bg-black/20"></div>
            <div class="p-4 flex gap-2">
                <input type="text" id="msg-input" placeholder="Type message..." class="flex-1 bg-white/5 p-4 rounded-2xl outline-none">
                <button onclick="send()" class="bg-cyan-600 px-6 rounded-2xl font-bold">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let isLog=true, me=null, target=null, activeG=null;
        const pki=forge.pki, keys=pki.rsa.generateKeyPair(1024);
        const myPriv=keys.privateKey, myPub=pki.publicKeyToPem(keys.publicKey);

        function toggleAuth(){ isLog=!isLog; document.getElementById('auth-head').innerText=isLog?'CYBER LOGIN':'REGISTER UNIT'; }

        async function auth(){
            const u=document.getElementById('user-in').value, p=document.getElementById('pass-in').value;
            const res=await fetch(isLog?'/login':'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,publicKey:myPub})});
            const data=await res.json();
            if(res.ok){ me=data; if(!isLog || !data.handle) showSetup(); else start(); } else alert(data.error);
        }

        async function resetPass(){
            const u=prompt("Enter username to reset:");
            const p=prompt("Enter new password:");
            if(!u || !p) return;
            const res=await fetch('/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,newPassword:p})});
            if(res.ok) alert("Password Updated!");
        }

        function showSetup(){ document.getElementById('auth-box').classList.add('hidden'); document.getElementById('setup-box').classList.remove('hidden'); }
        async function saveHandle(){
            const h=document.getElementById('handle-in').value;
            await fetch('/add-member',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:me.username,handle:h})});
            me.handle=h; start();
        }

        function start(){
            document.getElementById('auth-box').classList.add('hidden'); document.getElementById('setup-box').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            setInterval(sync, 1000); refreshGroups();
        }

        async function searchUsers(){
            const val=document.getElementById('search-in').value.toLowerCase();
            if(!val){ document.getElementById('user-results').innerHTML=''; return; }
            const res=await fetch('/users'); const all=await res.json();
            document.getElementById('user-results').innerHTML = all.filter(u=>u.username.includes(val) && u.username!==me.username).map(u=>`
                <div onclick="setTarget('${u.username}','${u.handle}','${u.publicKey}')" class="p-2 hover:bg-white/10 rounded-lg cursor-pointer text-xs flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full ${u.status==='online'?'bg-green-500':'bg-red-500'}"></span> @${u.handle}
                </div>`).join('');
        }

        async function newGroup(){
            const n=prompt("Group Name:"); if(!n) return;
            await fetch('/create-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groupName:n,creator:me.username})});
            refreshGroups();
        }

        async function refreshGroups(){
            const res=await fetch(`/my-groups/${me.username}`); const data=await res.json();
            document.getElementById('group-results').innerHTML = Object.keys(data).map(id=>`
                <div onclick="setGroup('${id}','${data[id].name}','${data[id].creator}')" class="p-3 bg-white/5 hover:bg-white/10 rounded-xl cursor-pointer text-[11px] font-bold"># ${data[id].name}</div>`).join('');
        }

        function setTarget(u,h,pk){ target={username:u,handle:h,publicKey:pk}; activeG=null; document.getElementById('chat-title').innerText="@"+h; document.getElementById('add-btn').classList.add('hidden'); document.getElementById('del-btn').classList.add('hidden'); document.getElementById('chat-msgs').innerHTML=''; }
        function setGroup(id,n,c){ activeG={groupId:id,name:n}; target=null; document.getElementById('chat-title').innerText="# "+n; document.getElementById('add-btn').classList.remove('hidden'); if(c===me.username) document.getElementById('del-btn').classList.remove('hidden'); else document.getElementById('del-btn').classList.add('hidden'); document.getElementById('chat-msgs').innerHTML=''; }

        async function addMem(){
            const u=prompt("Add Username:"); if(!u) return;
            await fetch('/add-member',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groupId:activeG.groupId,newUser:u})});
            alert("Added!");
        }

        async function delGrp(){
            if(!confirm("Delete?")) return;
            await fetch('/delete-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groupId:activeG.groupId,username:me.username})});
            location.reload();
        }

        async function send(){
            const msg=document.getElementById('msg-input').value; if(!msg) return;
            if(target){
                const enc=forge.util.encode64(pki.publicKeyFromPem(target.publicKey).encrypt(msg));
                await fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:me.username,receiver:target.username,message:enc})});
                document.getElementById('chat-msgs').innerHTML += `<div class="text-right"><span class="bg-cyan-600 p-2 rounded-lg text-sm inline-block">${msg}</span></div>`;
            } else if(activeG){
                await fetch('/send-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groupId:activeG.groupId,sender:me.username,message:msg})});
            }
            document.getElementById('msg-input').value='';
        }

        async function sync(){
            if(!me) return;
            const resP=await fetch(`/messages/${me.username}`); const msgsP=await resP.json();
            msgsP.forEach(m=>{ try{ const dec=myPriv.decrypt(forge.util.decode64(m.message)); document.getElementById('chat-msgs').innerHTML+=`<div><span class="bg-white/10 p-2 rounded-lg text-sm inline-block"><b>${m.sender}:</b> ${dec}</span></div>`;}catch(e){}});
            if(activeG){
                const resG=await fetch(`/group-messages/${activeG.groupId}`); const msgsG=await resG.json();
                const area=document.getElementById('chat-msgs'); area.innerHTML='';
                Object.values(msgsG).forEach(m=> area.innerHTML+=`<div class="${m.sender===me.username?'text-right':''}"><span class="${m.sender===me.username?'bg-cyan-600':'bg-white/10'} p-2 rounded-lg text-sm inline-block"><b>${m.sender}:</b> ${m.message}</span></div>`);
            }
        }
    </script>
</body>
</html>
