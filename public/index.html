<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER MESSENGER | MOAMEN ABDELFATTAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cyber: '#06b6d4' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        .glass { @apply bg-white/10 dark:bg-slate-900/50 backdrop-blur-xl border border-white/20 dark:border-slate-800; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/30 rounded; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user-item { cursor: pointer; transition: all 0.2s; }
        .user-item:hover { background: rgba(6, 182, 212, 0.1); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 min-h-screen">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex flex-col">
            <h1 class="text-xl font-black tracking-tighter text-cyber uppercase italic font-mono">Cyber Messenger</h1>
            <p class="text-[10px] font-bold opacity-60 tracking-widest uppercase">Prepared by: Moamen Abdelfattah</p>
        </div>
        <div id="user-badge" class="hidden flex items-center gap-2 bg-cyber/10 px-3 py-1 rounded-full border border-cyber/20">
            <div class="w-2 h-2 bg-cyber rounded-full animate-pulse"></div>
            <span id="active-user" class="text-xs font-bold"></span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="auth-section" class="max-w-md mx-auto mt-12 glass p-8 rounded-[2rem] shadow-2xl border-t-4 border-cyber">
            <h2 id="auth-title" class="text-center text-2xl font-black mb-8 uppercase italic">Security Terminal</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Agent ID / Username" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition">
                <input type="password" id="password" placeholder="Passcode" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition">
                <button onclick="handleAuth()" id="btn-main" class="w-full bg-cyber text-white p-4 rounded-xl font-black uppercase text-xs shadow-lg">Authorize Access</button>
                <div class="flex justify-between px-2 text-[10px] font-bold text-slate-500 uppercase">
                    <button onclick="toggleAuth()" id="toggle-text" class="hover:text-cyber transition">New Identity? Register</button>
                    <button onclick="resetPass()" class="hover:text-red-400 transition">Reset Passcode</button>
                </div>
            </div>
        </div>

        <div id="setup-section" class="hidden max-w-md mx-auto mt-12 glass p-8 rounded-[2rem] shadow-2xl border-t-4 border-green-500">
            <h2 class="text-center text-2xl font-black mb-4 uppercase text-green-500 italic">Identity Setup</h2>
            <input type="text" id="new-handle" placeholder="@username" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-green-500 mb-4">
            <button onclick="saveHandle()" class="w-full bg-green-500 text-white p-4 rounded-xl font-black uppercase text-xs">Confirm Identity</button>
        </div>

        <div id="chat-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-[78vh]">
            <div class="lg:col-span-4 glass rounded-[2rem] p-6 flex flex-col overflow-hidden">
                <h3 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em] mb-4">Search Agents</h3>
                <input type="text" id="searchInput" oninput="loadUsers()" placeholder="Search by handle..." class="mb-6 bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-xs outline-none focus:ring-1 focus:ring-cyber">
                <div id="user-list" class="space-y-2 overflow-y-auto mb-4 border-b border-white/5 pb-2"></div>
                
                <div class="mt-8 border-t border-white/10 pt-4 flex-1 flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em]">Secure Groups</h3>
                        <button onclick="createGroup()" class="bg-cyber/20 text-cyber text-[9px] px-2 py-1 rounded font-bold hover:bg-cyber hover:text-white transition">+ Create</button>
                    </div>
                    <div id="group-list" class="space-y-2 overflow-y-auto flex-1"></div>
                </div>
            </div>

            <div class="lg:col-span-8 glass rounded-[2rem] flex flex-col overflow-hidden relative">
                <div id="chat-header" class="p-5 border-b border-white/10 flex items-center justify-between bg-white/5">
                    <div class="flex items-center gap-3">
                        <div id="target-avatar" class="w-10 h-10 rounded-full bg-cyber/20 flex items-center justify-center font-bold text-cyber uppercase font-mono text-xs">?</div>
                        <div>
                            <h3 id="current-chat-name" class="font-bold text-sm uppercase">Select Node</h3>
                            <p id="chat-status" class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">Tunnel Offline</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="add-mem-btn" onclick="addMemberToGroup()" class="hidden bg-green-500/20 text-green-500 text-[9px] px-3 py-2 rounded-full font-black uppercase">+ Add</button>
                        <button id="delete-group-btn" onclick="deleteActiveGroup()" class="hidden bg-red-500/20 text-red-500 text-[9px] px-3 py-2 rounded-full font-black uppercase">Terminate</button>
                    </div>
                </div>
                <div id="msg-area" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area bg-slate-50/50 dark:bg-transparent"></div>
                <div class="p-4 bg-white/5 border-t border-white/10 flex gap-3">
                    <input type="text" id="msg-input" placeholder="Type secure data..." class="flex-1 bg-slate-100 dark:bg-slate-950 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-cyber">
                    <button onclick="dispatchMessage()" class="bg-cyber p-4 rounded-2xl text-white shadow-xl hover:scale-105 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isLogin = true, currentUser = null, targetUser = null, activeGroup = null;
        const pki = forge.pki, keypair = pki.rsa.generateKeyPair(1024);
        const myPubKeyPem = pki.publicKeyToPem(keypair.publicKey), myPrivKey = keypair.privateKey;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Security Terminal' : 'Register Identity';
            document.getElementById('btn-main').innerText = isLogin ? 'Authorize Access' : 'Register & Start';
            document.getElementById('toggle-text').innerText = isLogin ? 'New Identity? Register' : 'Back to Login';
        }

        async function handleAuth() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if(!user || !pass) return alert("Credentials Missing");
            const res = await fetch(isLogin ? '/login' : '/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:user, password:pass, publicKey:myPubKeyPem})});
            const data = await res.json();
            if(res.ok) { currentUser = data; if(!isLogin || !data.handle) showSetup(); else startChat(); } else alert(data.error);
        }

        async function resetPass() {
            const u = prompt("Enter username to reset:");
            const p = prompt("Enter new password:");
            if(!u || !p) return;
            const res = await fetch('/reset-password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, newPassword:p})});
            if(res.ok) alert("Passcode Updated Successfully!");
        }

        function showSetup() { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('setup-section').classList.remove('hidden'); }
        async function saveHandle() {
            const h = document.getElementById('new-handle').value.trim().toLowerCase();
            if(!h) return;
            await fetch('/add-member', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser.username, handle: h})});
            currentUser.handle = h; startChat();
        }

        function startChat() {
            document.getElementById('auth-section').classList.add('hidden'); document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden'); document.getElementById('user-badge').classList.remove('hidden');
            document.getElementById('active-user').innerText = "@" + (currentUser.handle || currentUser.username);
            setInterval(syncAll, 1000); loadGroups();
        }

        async function loadUsers() {
            const val = document.getElementById('searchInput').value.trim().toLowerCase();
            const list = document.getElementById('user-list');
            if(!val) { list.innerHTML = ''; return; }
            const res = await fetch('/users'); const data = await res.json();
            list.innerHTML = data.filter(u => u.handle.toLowerCase().includes(val) && u.username !== currentUser.username).map(u => `
                <div onclick="setTarget('${u.username}', '${u.handle}', '${u.publicKey}')" class="user-item p-3 rounded-xl animate-fade-in flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full ${u.status === 'online' ? 'bg-green-500' : 'bg-red-500'} shadow-sm"></div>
                        <p class="font-bold text-[11px] uppercase tracking-tighter">@${u.handle}</p>
                    </div>
                    <span class="text-[8px] font-black opacity-30 uppercase">Select</span>
                </div>`).join('');
        }

        async function createGroup() {
            const n = prompt("Group Name:"); if(!n) return;
            await fetch('/create-group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({groupName: n, creator: currentUser.username})});
            loadGroups();
        }

        async function loadGroups() {
            const res = await fetch(`/my-groups/${currentUser.username}`); const groups = await res.json();
            document.getElementById('group-list').innerHTML = Object.keys(groups).map(id => `
                <div onclick="setGroup('${id}', '${groups[id].name}', '${groups[id].creator}')" class="p-3 rounded-xl cursor-pointer bg-white/5 hover:bg-cyber/10 transition-all font-bold text-[10px] uppercase text-cyber mb-1">
                    # ${groups[id].name}
                </div>`).join('');
        }

        async function addMemberToGroup() {
            const u = prompt("Username to add:"); if(!u) return;
            await fetch('/add-member', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({groupId: activeGroup.groupId, newUser: u})});
            alert("Added!");
        }

        async function deleteActiveGroup() {
            if(!confirm("Terminate group?")) return;
            const res = await fetch('/delete-group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({groupId: activeGroup.groupId, username: currentUser.username})});
            if(res.ok) location.reload();
        }

        function setTarget(u, h, pk) {
            targetUser = {username: u, handle: h, publicKey: pk}; activeGroup = null;
            document.getElementById('chat-title').innerText = "@" + h;
            document.getElementById('chat-status').innerText = "RSA SECURE TUNNEL ACTIVE";
            document.getElementById('add-mem-btn').classList.add('hidden'); document.getElementById('delete-group-btn').classList.add('hidden');
            document.getElementById('msg-area').innerHTML = ''; document.getElementById('user-list').innerHTML = ''; document.getElementById('searchInput').value = '';
        }

        function setGroup(id, n, c) {
            activeGroup = {groupId: id, name: n}; targetUser = null;
            document.getElementById('chat-title').innerText = "# " + n;
            document.getElementById('chat-status').innerText = "GROUP BROADCAST ACTIVE";
            document.getElementById('add-mem-btn').classList.remove('hidden');
            if(c === currentUser.username) document.getElementById('delete-group-btn').classList.remove('hidden'); else document.getElementById('delete-group-btn').classList.add('hidden');
            document.getElementById('chat-msgs').innerHTML = '';
        }

        async function dispatchMessage() {
            const input = document.getElementById('msg-input'), text = input.value.trim(); if(!text) return;
            if(targetUser) {
                const enc = forge.util.encode64(pki.publicKeyFromPem(targetUser.publicKey).encrypt(text));
                await fetch('/send', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sender: currentUser.username, receiver: targetUser.username, message: enc})});
                document.getElementById('msg-area').innerHTML += `<div class="flex justify-end animate-fade-in"><div class="bg-cyber text-white p-3 rounded-2xl rounded-tr-none text-sm shadow-lg">${text}</div></div>`;
            } else if(activeGroup) {
                await fetch('/send-group', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({groupId: activeGroup.groupId, sender: currentUser.username, message: text})});
            }
            input.value = ''; const area = document.getElementById('msg-area'); area.scrollTop = area.scrollHeight;
        }

        async function syncAll() {
            if(!currentUser) return;
            const pRes = await fetch(`/messages/${currentUser.username}`); const pMsgs = await pRes.json();
            pMsgs.forEach(m => { try { const d = myPrivKey.decrypt(forge.util.decode64(m.message)); document.getElementById('msg-area').innerHTML += `<div class="flex justify-start animate-fade-in"><div class="glass p-3 rounded-2xl rounded-tl-none text-sm"><b>${m.sender}:</b><br>${d}</div></div>`; } catch(e) {} });
            if(activeGroup) {
                const gRes = await fetch(`/group-messages/${activeGroup.groupId}`); const gMsgs = await gRes.json();
                const area = document.getElementById('msg-area'); area.innerHTML = '';
                Object.values(gMsgs).forEach(m => {
                    const isMe = m.sender === currentUser.username;
                    area.innerHTML += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-fade-in"><div class="${isMe ? 'bg-cyber text-white' : 'glass'} p-3 rounded-2xl ${isMe ? 'rounded-tr-none' : 'rounded-tl-none'} text-sm"><b>${m.sender}:</b><br>${m.message}</div></div>`;
                });
            }
        }
    </script>
</body>
</html>
