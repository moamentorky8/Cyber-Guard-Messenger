<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Messenger | التراسل الآمن</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        button { width: 95%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        #usersContainer { max-height: 200px; overflow-y: auto; margin-top: 10px; text-align: right; }
        .user-item { background: #3d3d3d; padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .status-online { color: #2ecc71; font-size: 12px; }
        .status-offline { color: #95a5a6; font-size: 12px; }
        .msg-box { background: #111; padding: 10px; height: 150px; overflow-y: auto; margin: 10px 0; border-radius: 5px; font-size: 14px; text-align: right; }
    </style>
</head>
<body>

    <div class="container" id="authBox">
        <h2 id="formTitle">تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()" id="loginBtn">دخول</button>
        <button onclick="register()" style="background: #28a745;">إنشاء حساب جديد</button>
        <p style="cursor:pointer; color:#aaa; font-size:12px;" onclick="toggleReset()">نسيت كلمة المرور؟</p>
        
        <div id="resetBox" class="hidden">
            <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
            <button onclick="resetPassword()" style="background: #ffc107; color: black;">تحديث كلمة المرور</button>
        </div>
    </div>

    <div class="container hidden" id="chatBox">
        <h3>أهلاً، <span id="myUser"></span></h3>
        
        <input type="text" id="searchInput" placeholder="بحث عن صديق..." onkeyup="loadUsers()">
        
        <div id="usersContainer">
            </div>

        <hr>
        <div id="chatWindow" class="hidden">
            <h4 id="chattingWith">تحدث مع: ...</h4>
            <div id="messages" class="msg-box"></div>
            <input type="text" id="msgInput" placeholder="اكتب رسالة مشفرة...">
            <button onclick="sendMessage()">إرسال بالـ RSA</button>
        </div>
        
        <button onclick="location.reload()" style="background: #dc3545; margin-top: 20px;">تسجيل خروج</button>
    </div>

    <script>
        let loggedInUser = null;
        let selectedUser = null;
        let myKeys = null;

        // توليد مفاتيح RSA عند فتح الصفحة
        const rsa = forge.pki.rsa;
        myKeys = rsa.generateKeyPair({bits: 1024});
        const publicKeyPem = forge.pki.publicKeyToPem(myKeys.publicKey);

        // 1. تسجيل الحساب
        async function register() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass, publicKey: publicKeyPem })
            });
            const data = await res.json();
            alert(data.message || data.error);
        }

        // 2. تسجيل الدخول
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            if (res.ok) {
                loggedInUser = await res.json();
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('chatBox').classList.remove('hidden');
                document.getElementById('myUser').innerText = loggedInUser.username;
                loadUsers();
                startHeartbeat();
            } else {
                alert("بيانات خاطئة!");
            }
        }

        // 3. إعادة تعيين كلمة المرور
        async function resetPassword() {
            const user = document.getElementById('username').value;
            const newPass = document.getElementById('newPassword').value;
            const res = await fetch('/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, newPassword: newPass })
            });
            const data = await res.json();
            alert(data.message || data.error);
        }

        // 4. تحميل المستخدمين والبحث وحالة الـ Online
        async function loadUsers() {
            const search = document.getElementById('searchInput').value;
            const res = await fetch(`/users?search=${search}`);
            const users = await res.json();
            const container = document.getElementById('usersContainer');
            container.innerHTML = "";

            users.forEach(u => {
                if (u.username === loggedInUser.username) return;
                const statusClass = u.status === 'online' ? 'status-online' : 'status-offline';
                container.innerHTML += `
                    <div class="user-item" onclick="selectUser('${u.username}', '${u.publicKey.replace(/\n/g, '')}')">
                        <strong>${u.username}</strong>
                        <span class="${statusClass}">● ${u.status}</span>
                    </div>
                `;
            });
        }

        // 5. اختيار شخص للمراسلة
        function selectUser(name, key) {
            selectedUser = { username: name, publicKey: key };
            document.getElementById('chatWindow').classList.remove('hidden');
            document.getElementById('chattingWith').innerText = "تحدث مع: " + name;
            document.getElementById('messages').innerHTML = ""; // تنظيف الشات
        }

        // 6. إرسال رسالة مشفرة RSA
        async function sendMessage() {
            const plainText = document.getElementById('msgInput').value;
            if (!selectedUser || !plainText) return;

            // التشفير باستخدام المفتاح العام للمستلم
            const pubKey = forge.pki.publicKeyFromPem(selectedUser.publicKey);
            const encrypted = forge.util.encode64(pubKey.encrypt(plainText));

            await fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sender: loggedInUser.username, receiver: selectedUser.username, message: encrypted })
            });
            
            document.getElementById('messages').innerHTML += `<div>أنت: ${plainText} (تم التشفير قبل الإرسال)</div>`;
            document.getElementById('msgInput').value = "";
        }

        // 7. استلام الرسايل وفك تشفيرها
        async function checkMessages() {
            if (!loggedInUser) return;
            const res = await fetch(`/messages/${loggedInUser.username}`);
            const msgs = await res.json();
            const box = document.getElementById('messages');
            
            msgs.forEach(m => {
                try {
                    const decrypted = myKeys.privateKey.decrypt(forge.util.decode64(m.message));
                    box.innerHTML += `<div style="color:#007bff">${m.sender}: ${decrypted}</div>`;
                } catch (e) {
                    console.log("رسالة مشفرة بمفتاح آخر");
                }
            });
        }

        // 8. القلب النابض (Heartbeat) للتحديث التلقائي
        function startHeartbeat() {
            setInterval(async () => {
                await fetch('/heartbeat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: loggedInUser.username })
                });
                if (document.getElementById('searchInput').value === "") loadUsers();
                checkMessages();
            }, 5000);
        }

        function toggleReset() { document.getElementById('resetBox').classList.toggle('hidden'); }
    </script>
</body>
</html>
