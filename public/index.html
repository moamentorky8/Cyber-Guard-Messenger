<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER MESSENGER | MOAMEN ABDELFATTAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { cyber: '#06b6d4' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; user-select: none !important; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { @apply bg-white/10 dark:bg-slate-900/50 backdrop-blur-xl border border-white/20 dark:border-slate-800; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/30 rounded; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-btn { @apply opacity-0 group-hover:opacity-100 transition-all text-[12px] ml-2 cursor-pointer hover:text-cyber inline-block; }
        .notification-dot { @apply w-2 h-2 bg-red-500 rounded-full absolute top-2 right-2 animate-pulse; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 min-h-screen p-4 flex flex-col">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg rounded-2xl mb-6">
        <div class="flex flex-col">
            <h1 class="text-xl font-black tracking-tighter text-cyber uppercase italic font-mono">Cyber Messenger</h1>
            <p class="text-[10px] font-bold opacity-60 tracking-widest uppercase">Prepared by: Moamen Abdelfattah</p>
        </div>
        <div id="user-badge" class="hidden flex items-center gap-4">
            <div class="flex items-center gap-2 bg-cyber/10 px-3 py-1 rounded-full border border-cyber/20">
                <div class="w-2 h-2 bg-cyber rounded-full animate-pulse"></div>
                <span id="active-user" class="text-xs font-bold mono text-white"></span>
            </div>
            <button onclick="logout()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto w-full flex-1 flex flex-col">
        <section id="auth-section" class="max-w-md mx-auto mt-12 w-full glass p-8 rounded-[2rem] shadow-2xl border-t-4 border-cyber animate-slide-up">
            <h2 id="auth-title" class="text-center text-2xl font-black mb-8 uppercase italic text-cyber text-white">Security Terminal</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Agent ID" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition text-white text-center">
                <input type="password" id="password" placeholder="Passcode" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition text-white text-center">
                <button onclick="handleAuth()" class="w-full bg-cyber text-white p-4 rounded-xl font-black uppercase text-xs shadow-lg hover:bg-cyan-500 transition">Authorize Access</button>
                <div class="flex justify-between px-2 text-[10px] font-bold text-slate-500 uppercase mt-4">
                    <button onclick="toggleAuth()" id="toggle-text" class="hover:text-cyber">Initialize New Node</button>
                    <button onclick="handleReset()">Reset Pass</button>
                </div>
            </div>
        </section>

        <section id="setup-section" class="hidden max-w-md mx-auto mt-12 w-full glass p-8 rounded-[2rem] border-t-4 border-green-500 animate-slide-up text-center">
            <h2 class="text-2xl font-black text-green-500 mb-4 uppercase italic">Identity Setup</h2>
            <p class="text-[10px] opacity-60 mb-6 uppercase tracking-widest text-white">Assign handle for synchronization</p>
            <input type="text" id="new-handle-input" placeholder="@nickname" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none mb-4 text-center text-white focus:ring-2 focus:ring-green-500 font-bold">
            <button onclick="saveHandle()" class="w-full bg-green-500 text-white p-4 rounded-xl font-black uppercase text-xs">Confirm Identity</button>
        </section>

        <div id="chat-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-4 h-[80vh] animate-slide-up overflow-hidden">
            <aside class="lg:col-span-3 glass rounded-[2rem] p-5 flex flex-col overflow-hidden">
                <p class="text-[9px] font-black text-cyber uppercase mb-4 tracking-widest italic border-b border-white/5 pb-2">Historical Inbox</p>
                <div id="inbox-list" class="flex-1 overflow-y-auto space-y-2 chat-area"></div>
            </aside>

            <main class="lg:col-span-6 glass rounded-[2rem] flex flex-col overflow-hidden relative border-x border-white/5">
                <div id="chat-header" class="p-4 border-b border-white/10 flex items-center justify-between bg-white/5">
                    <div class="flex items-center gap-3">
                        <div id="target-avatar" class="w-10 h-10 rounded-full bg-cyber/20 flex items-center justify-center font-black text-cyber font-mono uppercase tracking-tighter">?</div>
                        <div>
                            <h3 id="t-name" class="font-bold text-sm uppercase italic text-white font-mono">Select Node</h3>
                            <p id="t-status" class="text-[8px] opacity-40 uppercase font-black">Secure Tunnel Offline</p>
                        </div>
                    </div>
                </div>
                <div id="msgs-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area bg-slate-900/10"></div>
                <div class="p-4 bg-black/20 flex gap-3 items-center">
                    <input type="text" id="m-input" placeholder="Type secure packet..." class="flex-1 bg-transparent outline-none text-sm px-4 text-white">
                    <button id="send-btn" onclick="dispatchMsg()" class="bg-cyber text-black p-3 rounded-xl font-black hover:scale-105 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                    </button>
                </div>
            </main>

            <aside class="lg:col-span-3 glass rounded-[2rem] p-5 flex flex-col overflow-hidden">
                <p class="text-[9px] font-black text-cyber uppercase mb-4 tracking-widest italic border-b border-white/5 pb-2">Node Discovery</p>
                <input type="text" id="searchInput" oninput="loadUsers()" placeholder="Search Agent ID..." class="mb-4 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none focus:ring-1 focus:ring-cyber transition text-white w-full">
                <div id="user-list" class="flex-1 overflow-y-auto space-y-2 chat-area"></div>
            </aside>
        </div>
    </main>

    <script>
        let isLogin = true, me = null, target = null, myPriv = null, lastLen = 0, usersRaw = [];
        const pki = forge.pki;

        function toggleAuth() { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? 'Security Terminal' : 'Registration'; }

        async function handleAuth() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return alert("Credentials Missing");

            const securePass = forge.md.sha256.create().update(p).digest().toHex();

            // استخدام 1024 بت (v10) لضمان أمان البيانات ومنع التلخبط
            let sPriv = localStorage.getItem(`priv_v10_${u}`), sPub = localStorage.getItem(`pub_v10_${u}`);
            if(!sPriv) {
                const pair = pki.rsa.generateKeyPair(1024);
                sPriv = pki.privateKeyToPem(pair.privateKey); sPub = pki.publicKeyToPem(pair.publicKey);
                localStorage.setItem(`priv_v10_${u}`, sPriv); localStorage.setItem(`pub_v10_${u}`, sPub);
            }
            myPriv = pki.privateKeyFromPem(sPriv);

            const res = await fetch('/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, password:securePass, publicKey:btoa(sPub), isLogin})});
            const data = await res.json();
            if(res.ok) {
                me = data;
                document.getElementById('auth-section').classList.add('hidden');
                if(!me.handle || me.handle === "") document.getElementById('setup-section').classList.remove('hidden');
                else enterTerminal();
            } else alert(data.error);
        }

        async function saveHandle() {
            const h = document.getElementById('new-handle-input').value.trim();
            if(!h) return alert("Handle required");
            let curU = (me && me.username) ? me.username : document.getElementById('username').value.trim().toLowerCase();
            const res = await fetch('/set-handle', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: curU, handle: h})});
            if(res.ok) { if(me) me.handle = h; enterTerminal(); }
        }

        function enterTerminal() {
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('user-badge').classList.remove('hidden');
            document.getElementById('active-user').innerText = "@" + (me.handle || me.username);
            setInterval(sync, 1000); fetchUsers();
        }

        async function fetchUsers() { const res = await fetch('/users'); usersRaw = await res.json(); }

        function loadUsers() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('user-list');
            if (q === "") { container.innerHTML = ""; return; }
            const filtered = usersRaw.filter(u => (u.username.toLowerCase().includes(q) || (u.handle && u.handle.toLowerCase().includes(q))) && u.username !== me.username);
            container.innerHTML = filtered.map(u => `<div onclick='setTarget(${JSON.stringify(u)})' class="p-3 glass rounded-xl cursor-pointer hover:bg-cyber/10 mb-1 border border-white/5 flex justify-between items-center transition-all">
                <span class="text-[10px] font-black uppercase text-white font-mono">@${u.handle || u.username}</span>
                <div class="w-1.5 h-1.5 rounded-full ${u.status === 'online' ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : 'bg-slate-700'}"></div>
            </div>`).join('');
        }

        function setTarget(u) {
            target = u; lastLen = 0;
            document.getElementById('t-name').innerText = (u.handle || u.username).toUpperCase();
            document.getElementById('target-avatar').innerText = (u.handle || u.username)[0].toUpperCase();
            document.getElementById('t-status').innerText = "PRIVATE_RSA_TUNNEL_ACTIVE";
            document.getElementById('msgs-box').innerHTML = '';
        }

        async function dispatchMsg() {
            const input = document.getElementById('m-input'), txt = input.value.trim();
            if(!txt || !target) return;
            try {
                // جلب أحدث مفتاح للطرف الآخر من السيرفر لضمان عدم حدوث Fault
                const res = await fetch('/users');
                const all = await res.json();
                const freshTarget = all.find(u => u.username === target.username);
                if(!freshTarget || !freshTarget.publicKey) throw new Error("Key Lost");

                const pubKey = pki.publicKeyFromPem(atob(freshTarget.publicKey));
                const encrypted = pubKey.encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP');
                const packet = forge.util.encode64(encrypted);
                
                await fetch('/send', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({sender: me.username, receiver: target.username, message: packet})});
                input.value = ''; sync();
            } catch (e) { alert("Encryption Error: Handshake Failed"); }
        }

        async function sync() {
            if(!me) return;
            try {
                // تحديث الـ Inbox مع النقطة الحمراء للرسايل الجديدة
                const inRes = await fetch(`/messages/${me.username}`);
                const packets = await inRes.json();
                const unique = {};
                packets.forEach(p => { if(!unique[p.sender]) {
                    try { 
                        const dec = myPriv.decrypt(forge.util.decode64(p.message), 'RSA-OAEP');
                        unique[p.sender] = forge.util.decodeUtf8(dec);
                    } catch(e) { unique[p.sender] = "🔒 [Encrypted]"; }
                }});
                
                document.getElementById('inbox-list').innerHTML = Object.keys(unique).map(s => {
                    const sData = usersRaw.find(u => u.username === s) || {handle: s};
                    return `<div onclick='openFromInbox("${s}")' class="p-3 glass rounded-xl cursor-pointer border-l-2 border-cyber mb-2 hover:bg-cyber/5 relative">
                        <div class="notification-dot"></div>
                        <p class="text-[9px] font-black uppercase text-cyber">@${sData.handle || s}</p>
                        <p class="text-[8px] opacity-60 truncate text-white">${unique[s]}</p>
                    </div>`}).join('');

                if(!target) return;
                const res = await fetch(`/messages-full/${me.username}/${target.username}`);
                const msgs = await res.json();
                if(msgs.length === lastLen) return;
                lastLen = msgs.length;
                
                document.getElementById('msgs-box').innerHTML = msgs.map(m => {
                    let d = m.message; const isMe = m.sender === me.username;
                    if(!isMe) { try { d = forge.util.decodeUtf8(myPriv.decrypt(forge.util.decode64(m.message), 'RSA-OAEP')); } catch(e) { d = "🔒 Decryption Failed"; } }
                    return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up group font-mono">
                        <div class="${isMe ? 'bg-cyber text-black font-black' : 'glass text-white'} p-4 rounded-2xl max-w-[80%] relative shadow-lg">
                            <p class="text-[7px] uppercase opacity-50 font-black mb-1">${m.sender} ${m.edited ? '[CORRECTED]' : ''}</p>
                            <p class="text-xs">${d}</p>
                            ${isMe ? `<div class="mt-2 text-right border-t border-black/10 pt-1 opacity-0 group-hover:opacity-100 transition-all">
                                <span onclick="ui_edit('${m.id}')" class="msg-btn">✎</span>
                                <span onclick="ui_del('${m.id}')" class="msg-btn text-red-500 ml-2">✖</span>
                            </div>` : ''}
                        </div></div>`;
                }).join('');
                document.getElementById('msgs-box').scrollTop = document.getElementById('msgs-box').scrollHeight;
            } catch(e) {}
        }

        function openFromInbox(s) { const u = usersRaw.find(x => x.username === s); if(u) setTarget(u); }
        function logout() { localStorage.clear(); location.reload(); }
        async function handleReset() {
            const u = prompt("ID:"), p = prompt("New Pass:");
            if(u && p) {
                const sNew = forge.md.sha256.create().update(p).digest().toHex();
                await fetch('/reset-pass', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, newPassword:sNew})});
            }
        }
        async function ui_edit(id) {
            const n = prompt("Correct packet:");
            if(n) { await fetch('/edit-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, newVal: n})}); lastLen = 0; }
        }
        async function ui_del(id) {
            if(confirm("Destroy packet?")) { await fetch('/del-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id})}); lastLen = 0; }
        }
    </script>
</body>
</html>
