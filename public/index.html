<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER MESSENGER | MOAMEN ABDELFATTAH</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

<script>
tailwind.config = {
    darkMode: 'class',
    theme: { extend: { colors: { cyber: '#06b6d4' } } }
}
</script>

<style>
body { font-family: 'Inter', sans-serif; user-select: none !important; }
.glass { @apply bg-white/10 dark:bg-slate-900/50 backdrop-blur-xl border border-white/20 dark:border-slate-800; }
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/30 rounded; }
.animate-slide-up { animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 min-h-screen p-4 flex flex-col">

<nav class="glass px-6 py-4 rounded-2xl mb-6 flex justify-between">
    <h1 class="text-cyber font-black">Cyber Messenger</h1>
    <span id="active-user"></span>
</nav>

<input id="username" placeholder="username">
<input id="password" type="password">
<button onclick="handleAuth()">Login/Register</button>

<div id="setup-section" style="display:none;">
    <input id="new-handle-input" placeholder="handle">
    <button onclick="saveHandle()">Confirm</button>
</div>

<input id="searchInput" oninput="loadUsers()">
<div id="user-list"></div>

<input id="m-input">
<button onclick="dispatchMsg()">Send</button>

<div id="msgs-box"></div>

<script>
let isLogin = true, me = null, target = null, myPriv = null, myPubPem = null, lastLen = 0, usersRaw = [];
const pki = forge.pki;

/* ================= AUTH ================= */
async function handleAuth() {
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value.trim();
    if(!u || !p) return alert("Fill credentials");

    const securePass = forge.md.sha256.create().update(p).digest().toHex();

    let sPriv = localStorage.getItem(`cyber_v1_priv_${u}`);
    let sPub  = localStorage.getItem(`cyber_v1_pub_${u}`);

    if(!sPriv) {
        const pair = pki.rsa.generateKeyPair(2048);
        sPriv = pki.privateKeyToPem(pair.privateKey);
        sPub  = pki.publicKeyToPem(pair.publicKey);

        localStorage.setItem(`cyber_v1_priv_${u}`, sPriv);
        localStorage.setItem(`cyber_v1_pub_${u}`, sPub);
    }

    myPriv = pki.privateKeyFromPem(sPriv);
    myPubPem = sPub;

    const res = await fetch('/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: u,
            password: securePass,
            publicKey: btoa(sPub),
            isLogin
        })
    });

    const data = await res.json();

    if(res.ok) {
        me = data;
        if(!me.username) me.username = u;

        if(!me.handle) {
            document.getElementById('setup-section').style.display = 'block';
        } else {
            enterApp();
        }

    } else {
        alert(data.error || "Auth failed");
    }
}

/* ================= HANDLE ================= */
async function saveHandle() {
    const h = document.getElementById('new-handle-input').value.trim();
    if(!h) return alert("Enter handle");

    const curU = me.username;

    try {
        const res = await fetch('/set-handle', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: curU, handle: h })
        });

        const data = await res.json();

        if(res.ok) {
            me.handle = h;
            enterApp();
        } else {
            alert(data.error);
        }

    } catch {
        alert("Server error");
    }
}

/* ================= ENTER ================= */
function enterApp() {
    document.getElementById('active-user').innerText = "@" + (me.handle || me.username);
    setInterval(sync, 2000);
    fetchUsers();
}

/* ================= USERS ================= */
async function fetchUsers() {
    const res = await fetch('/users');
    usersRaw = await res.json();
}

function loadUsers() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();

    const filtered = usersRaw.filter(u =>
        u.username.toLowerCase().includes(q) &&
        u.username !== me.username
    );

    document.getElementById('user-list').innerHTML =
        filtered.map(u => `
            <div onclick='setTarget(${JSON.stringify(u)})'>
                @${u.handle || u.username}
            </div>
        `).join('');
}

function setTarget(u) {
    target = u;
    lastLen = 0;
    document.getElementById('msgs-box').innerHTML = '';
}

/* ================= SEND ================= */
async function dispatchMsg() {
    const input = document.getElementById('m-input');
    const txt = input.value.trim();

    if(!txt || !target) return;

    if(!target.publicKey) {
        alert("Target has no public key");
        return;
    }

    try {
        const myClean = me.username.toLowerCase();
        const targetClean = target.username.toLowerCase();

        const tPub = pki.publicKeyFromPem(atob(target.publicKey));

        const mRec = forge.util.encode64(
            tPub.encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP')
        );

        const mMe = forge.util.encode64(
            pki.publicKeyFromPem(myPubPem)
            .encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP')
        );

        await fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                sender: myClean,
                receiver: targetClean,
                message: mRec,
                senderCopy: mMe
            })
        });

        input.value = '';
        lastLen = 0;
        sync();

    } catch (e) {
        console.error(e);
        alert("Encryption Fault");
    }
}

/* ================= SYNC ================= */
async function sync() {
    if(!me || !target) return;

    const myClean = me.username.toLowerCase();

    const res = await fetch(`/messages-full/${myClean}/${target.username}`);
    const msgs = await res.json();

    if(msgs.length === lastLen) return;
    lastLen = msgs.length;

    document.getElementById('msgs-box').innerHTML =
        msgs.map(m => {
            const isMe = m.sender === myClean;

            let d = "";
            try {
                d = forge.util.decodeUtf8(
                    myPriv.decrypt(
                        forge.util.decode64(isMe ? m.senderCopy : m.message),
                        'RSA-OAEP'
                    )
                );
            } catch {
                d = "🔒";
            }

            return `<div>${m.sender}: ${d}</div>`;
        }).join('');
}
</script>

</body>
</html>
