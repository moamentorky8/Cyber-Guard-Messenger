<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER MESSENGER | MOAMEN ABDELFATTAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { cyber: '#06b6d4' } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; user-select: none !important; }
        .glass { @apply bg-white/10 dark:bg-slate-900/50 backdrop-blur-xl border border-white/20 dark:border-slate-800; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { @apply bg-cyber/30 rounded; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* تحسين مظهر أزرار التحكم */
        .msg-btn { @apply opacity-0 group-hover:opacity-100 transition-all text-[12px] ml-3 cursor-pointer inline-block px-2 py-1 rounded bg-white/5 hover:bg-white/10 active:scale-90; }
        .notification-dot { @apply w-2 h-2 bg-red-500 rounded-full absolute top-2 right-2 animate-pulse; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg rounded-2xl mb-6">
        <div class="flex flex-col">
            <h1 class="text-xl font-black tracking-tighter text-cyber uppercase italic font-mono">Cyber Messenger</h1>
            <p class="text-[10px] font-bold opacity-60 tracking-widest uppercase">Prepared by: Moamen Abdelfattah</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="user-badge" class="hidden flex items-center gap-2 bg-cyber/10 px-3 py-1 rounded-full border border-cyber/20">
                <div class="w-2 h-2 bg-cyber rounded-full animate-pulse"></div>
                <span id="active-user" class="text-xs font-bold uppercase tracking-tighter"></span>
            </div>
            <button onclick="logout()" id="logout-btn" class="hidden bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-red-500/20 hover:bg-red-500 hover:text-white transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto w-full flex-1 flex flex-col">
        <section id="auth-section" class="max-w-md mx-auto mt-12 w-full glass p-8 rounded-[2rem] shadow-2xl border-t-4 border-cyber animate-slide-up">
            <h2 id="auth-title" class="text-center text-2xl font-black mb-8 uppercase italic text-cyber font-mono">Security Terminal</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Agent ID" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition">
                <input type="password" id="password" placeholder="Passcode" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none focus:ring-2 focus:ring-cyber transition">
                <button onclick="handleAuth()" id="btn-main" class="w-full bg-cyber text-white p-4 rounded-xl font-black uppercase text-xs shadow-lg shadow-cyber/20">Authorize Access</button>
                <div class="flex justify-between px-2 text-[10px] font-bold text-slate-500 uppercase">
                    <button onclick="toggleAuth()" id="toggle-text" class="cursor-pointer hover:text-cyber">Initialize New Node</button>
                    <button onclick="handleReset()" class="cursor-pointer hover:text-red-400">Reset Pass</button>
                </div>
            </div>
        </section>

        <section id="setup-section" class="hidden max-w-md mx-auto mt-12 w-full glass p-8 rounded-[2rem] border-t-4 border-green-500 animate-slide-up text-center">
            <h2 class="text-2xl font-black text-green-500 mb-4 uppercase italic">Identity Setup</h2>
            <p class="text-[10px] opacity-60 mb-6 uppercase tracking-widest">Assign your handle in the encrypted network</p>
            <input type="text" id="new-handle" placeholder="@nickname" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 outline-none mb-4 focus:ring-2 focus:ring-green-500 transition">
            <button onclick="saveHandle()" class="w-full bg-green-500 text-white p-4 rounded-xl font-black uppercase text-xs">Confirm Identity</button>
        </section>

        <div id="chat-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-[75vh] animate-slide-up overflow-hidden">
            <aside class="lg:col-span-4 glass rounded-[2rem] p-6 flex flex-col overflow-hidden">
                <h3 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em] mb-4">Discovery Scan</h3>
                <input type="text" id="searchInput" oninput="drawUsers()" placeholder="Scan handle..." class="mb-6 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none focus:ring-1 focus:ring-cyber">
                
                <div class="flex-1 overflow-y-auto space-y-4 pr-2 chat-area">
                    <div>
                        <p class="text-[9px] font-black cyber-txt uppercase mb-2 italic tracking-widest">Inbound Packets (Inbox)</p>
                        <div id="inbox-list" class="space-y-1"></div>
                    </div>
                    <hr class="border-white/5">
                    <div>
                        <p class="text-[9px] font-black opacity-30 uppercase mb-2 italic tracking-widest">Discovered Nodes</p>
                        <div id="user-list" class="space-y-1"></div>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-8 glass rounded-[2rem] flex flex-col overflow-hidden relative">
                <div id="chat-header" class="p-5 border-b border-white/10 flex items-center justify-between bg-white/5">
                    <div class="flex items-center gap-3">
                        <div id="t-avatar" class="w-10 h-10 rounded-full bg-cyber/20 flex items-center justify-center font-black text-cyber uppercase">?</div>
                        <div>
                            <h3 id="t-name" class="font-bold text-sm uppercase italic">Select Node</h3>
                            <p id="t-status" class="text-[9px] opacity-40 uppercase">RSA Idle</p>
                        </div>
                    </div>
                </div>

                <div id="msgs-box" class="flex-1 overflow-y-auto p-6 space-y-4 chat-area bg-slate-900/20"></div>

                <div class="p-4 bg-black/20 flex gap-3 items-center">
                    <input type="text" id="m-input" placeholder="Type encrypted packet..." class="flex-1 bg-transparent outline-none text-sm px-4">
                    <button onclick="dispatchMsg()" class="bg-cyber text-black px-8 py-3 rounded-2xl font-black text-xs hover:scale-105 active:scale-95 transition-all">SEND</button>
                </div>
            </main>
        </div>
    </main>

    <script>
        let isLogin = true, me = null, target = null, myPriv = null, lastLen = 0, usersRaw = [];
        const pki = forge.pki;

        async function handleAuth() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return alert("System Warning: Credentials Missing");

            let sPriv = localStorage.getItem(`priv_v5_${u}`), sPub = localStorage.getItem(`pub_v5_${u}`);
            if(!sPriv) {
                const pair = pki.rsa.generateKeyPair(1024);
                sPriv = pki.privateKeyToPem(pair.privateKey);
                sPub = pki.publicKeyToPem(pair.publicKey);
                localStorage.setItem(`priv_v5_${u}`, sPriv);
                localStorage.setItem(`pub_v5_${u}`, sPub);
            }
            myPriv = pki.privateKeyFromPem(sPriv);

            const res = await fetch('/auth', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p, publicKey: btoa(sPub), isLogin})
            });
            const data = await res.json();
            if(res.ok) {
                if(!isLogin) { alert("Registration Success. Login now."); location.reload(); return; }
                me = data;
                document.getElementById('auth-section').classList.add('hidden');
                if(!data.handle) document.getElementById('setup-section').classList.remove('hidden');
                else enterTerminal();
            } else alert(data.error);
        }

        async function saveHandle() {
            const h = document.getElementById('new-handle').value.trim().toLowerCase();
            if(!h) return;
            await fetch('/set-handle', { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({username: me.username, handle: h})
            });
            me.handle = h; enterTerminal();
        }

        function enterTerminal() {
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('user-badge').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('active-user').innerText = me.handle || me.username;
            setInterval(sync, 1500); 
            fetchUsers();
        }

        async function fetchUsers() {
            const res = await fetch('/users');
            usersRaw = await res.json();
            drawUsers();
        }

        function drawUsers() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('user-list');
            const filtered = usersRaw.filter(u => (u.username.includes(q) || (u.handle && u.handle.includes(q))) && u.username !== me.username);
            
            container.innerHTML = filtered.map(u => `
                <div onclick='setTarget(${JSON.stringify(u)})' class="p-3 glass rounded-xl cursor-pointer hover:bg-cyber/10 flex justify-between items-center transition-all mb-1">
                    <span class="text-[10px] font-black uppercase tracking-tighter">@${u.handle || u.username}</span>
                    <div class="w-1.5 h-1.5 rounded-full ${u.status === 'online' ? 'bg-green-500 shadow-[0_0_5px_green]' : 'bg-slate-700'}"></div>
                </div>`).join('');
        }

        function setTarget(u) {
            target = u; lastLen = 0;
            document.getElementById('t-name').innerText = "@" + (u.handle || u.username);
            document.getElementById('t-avatar').innerText = (u.handle || u.username)[0].toUpperCase();
            document.getElementById('t-status').innerText = "PRIVATE_RSA_TUNNEL_ACTIVE";
            document.getElementById('msgs-box').innerHTML = '';
        }

        async function dispatchMsg() {
            const input = document.getElementById('m-input'), txt = input.value.trim();
            if(!txt || !target) return;
            try {
                const pubKey = pki.publicKeyFromPem(atob(target.publicKey));
                const packet = forge.util.encode64(pubKey.encrypt(forge.util.encodeUtf8(txt), 'RSA-OAEP'));
                await fetch('/send', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sender: me.username, receiver: target.username, message: packet})
                });
                input.value = '';
            } catch (e) { alert("ENCRYPTION_ERROR"); }
        }

        async function sync() {
            if(!me) return;
            
            // Inbox Logic
            try {
                const inRes = await fetch(`/inbox/${me.username}`);
                const packets = await inRes.json();
                const lastMsgs = {};
                packets.forEach(p => {
                    if(!lastMsgs[p.sender]) {
                        try {
                            const dec = myPriv.decrypt(forge.util.decode64(p.message), 'RSA-OAEP');
                            lastMsgs[p.sender] = forge.util.decodeUtf8(dec);
                        } catch(e) { lastMsgs[p.sender] = "🔒 [Encrypted]"; }
                    }
                });
                document.getElementById('inbox-list').innerHTML = Object.keys(lastMsgs).map(s => {
                    const senderData = usersRaw.find(u => u.username === s) || {username: s};
                    return `
                    <div onclick='openFromInbox("${s}")' class="p-3 glass rounded-xl cursor-pointer relative border-l-2 border-cyber mb-1 hover:bg-cyber/5">
                        <div class="notification-dot"></div>
                        <p class="text-[9px] font-black uppercase text-cyber">@${senderData.handle || s}</p>
                        <p class="text-[8px] opacity-60 truncate">${lastMsgs[s]}</p>
                    </div>`;
                }).join('');
            } catch(e) {}

            // Chat Sync
            if(!target) return;
            const res = await fetch(`/msgs/${me.username}/${target.username}`);
            const msgs = await res.json();
            if(msgs.length === lastLen) return;
            lastLen = msgs.length;

            document.getElementById('msgs-box').innerHTML = msgs.map(m => {
                let d = m.message; const isMe = m.sender === me.username;
                if(!isMe) {
                    try { d = forge.util.decodeUtf8(myPriv.decrypt(forge.util.decode64(m.message), 'RSA-OAEP')); } catch(e) { d = "🔒 [ENC_PACKET_SYNC_ERROR]"; }
                }
                return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up group">
                    <div class="${isMe ? 'bg-cyber text-black font-medium' : 'glass'} p-4 rounded-2xl max-w-[80%] relative shadow-lg">
                        <p class="text-[7px] uppercase opacity-50 font-black mb-1">${m.sender} ${m.edited ? '[CORRECTED]' : ''}</p>
                        <p class="text-xs">${d}</p>
                        ${isMe ? `<div class="mt-2 text-right border-t border-black/10 pt-1">
                            <span onclick="ui_edit('${m.id}')" class="msg-btn" title="Edit Packet">✎</span>
                            <span onclick="ui_del('${m.id}')" class="msg-btn text-red-500" title="Destroy Packet">✖</span>
                        </div>` : ''}
                    </div></div>`;
            }).join('');
            document.getElementById('msgs-box').scrollTop = document.getElementById('msgs-box').scrollHeight;
        }

        function openFromInbox(s) {
            const u = usersRaw.find(x => x.username === s);
            if(u) setTarget(u);
        }

        async function ui_edit(id) {
            const n = prompt("Re-encode packet data (Edit):");
            if(n) {
                await fetch('/edit-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, newVal: n})});
                lastLen = 0; // لضمان التحديث الفوري
            }
        }

        async function ui_del(id) {
            if(confirm("Are you sure you want to destroy this data packet (Delete)?")) {
                await fetch('/del-msg', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id})});
                lastLen = 0; // لضمان التحديث الفوري
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleAuth() { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? 'Security Terminal' : 'Registration'; }
        async function handleReset() {
            const user = prompt("Agent ID:"), p = prompt("New Cipher:");
            if(user && p) {
                const r = await fetch('/reset-pass', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: user, newPassword: p}) });
                if(r.ok) alert("Identity Reset Successful.");
            }
        }
    </script>
</body>
</html>
