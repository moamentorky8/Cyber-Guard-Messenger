<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Credentials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        cyber: "#06b6d4"
                    }
                }
            }
        };
    </script>
    <style>
        body {
            font-family: "Inter", sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        .glass {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 10px 40px rgba(2, 6, 23, 0.25);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full glass p-10 rounded-[2.5rem] border-t-4 border-red-500 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-500/10 rounded-full blur-3xl"></div>

        <div class="text-center mb-10">
            <h1 class="text-sm font-black text-red-500 uppercase tracking-[0.3em] mb-2">Security Recovery</h1>
            <h2 class="text-3xl font-black text-slate-900 dark:text-white uppercase italic">Reset Password</h2>
            <p class="text-[10px] opacity-50 mt-2 uppercase font-bold tracking-widest">Active session + current password required</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Confirm Agent Username</label>
                <input type="text" id="reset-user" placeholder="Target Identifier" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-red-500 transition">
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Current Passcode</label>
                <input type="password" id="current-pass" placeholder="Current passcode" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-red-500 transition">
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">New Secure Passcode</label>
                <input type="password" id="new-pass" placeholder="New passcode" class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-red-500 transition">
            </div>

            <button onclick="submitReset()" class="w-full bg-red-600 hover:bg-red-500 text-white p-4 rounded-2xl font-black shadow-lg shadow-red-600/20 transition-all active:scale-95 uppercase text-xs tracking-widest">
                Update Credentials
            </button>

            <p class="text-[11px] text-slate-500 leading-5">
                This page uses your active session cookie. If you are logged out, return to the main screen and sign in first.
            </p>

            <div class="text-center mt-6">
                <a href="/" class="text-xs font-bold text-slate-500 hover:text-cyber transition-all uppercase">
                    Return to Secure Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const dark =
            localStorage.theme === "dark" ||
            (!("theme" in localStorage) &&
                window.matchMedia("(prefers-color-scheme: dark)").matches);

        document.documentElement.classList.toggle("dark", dark);

        async function submitReset() {
            const username = document.getElementById("reset-user").value.trim().toLowerCase();
            const currentPassword = document.getElementById("current-pass").value.trim();
            const newPassword = document.getElementById("new-pass").value.trim();

            if (!username || !currentPassword || !newPassword) {
                return alert("All fields are mandatory.");
            }

            const response = await fetch("/reset-password", {
                method: "POST",
                credentials: "same-origin",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    currentPassword,
                    newPassword
                })
            });

            const data = await response.json().catch(() => ({}));
            if (response.ok) {
                alert("Password updated successfully.");
                window.location.href = "/";
                return;
            }

            alert(data.error || "Password reset failed.");
        }
    </script>
</body>
</html>
